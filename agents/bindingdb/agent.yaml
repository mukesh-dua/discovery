  ## Pattern 6: Find All Targets for a Specific Compound (SQLite SMILES Exact Match)

  **When to use**: Finding all protein targets that bind to a known compound with exact SMILES match
  **SQLite advantage**: 640 fields, <1ms response

  ```python
  import pandas as pd
  from bindingdb_utils import BindingDBUtils

  OUTPUT_DIR = '/output'  # From dataHandlingContext
  utils = BindingDBUtils(sqlite_db_path="/app/bindingdb.db")

  compound_smiles = "CC(C)CC1=CC=C(C=C1)C(C)C(=O)O"  # Ibuprofen

  print(f"Searching for all targets that bind to compound...")
  print(f"SMILES: {compound_smiles}")
  print("=" * 70)

  # Find all targets binding to this exact SMILES
  # Returns comprehensive data with 640 fields per entry
  binding_data = utils.search_ligands_by_smiles_sqlite(compound_smiles, limit=1000)

  if not binding_data:
      print("No targets found for this SMILES")
      results = {
          'compound_smiles': compound_smiles,
          'targets_found': 0,
          'message': 'No binding data found for exact SMILES match'
      }
  else:
      df = pd.DataFrame(binding_data)
      
      target_col = 'UniProt (SwissProt) Primary ID of Target Chain 1'
      unique_targets = df[target_col].dropna().unique()
      
      print(f"* Found {len(binding_data)} measurements across {len(unique_targets)} target(s)")
      print()
      
      target_summary = []
      for target_id in unique_targets:
          target_data = df[df[target_col] == target_id]
          
          # Find best affinity across measurement types
          best_affinity = None
          best_type = None
          
          kd_vals = target_data['Kd (nM)'].dropna()
          if len(kd_vals) > 0:
              best_affinity = kd_vals.min()
              best_type = 'Kd'
          
          ki_vals = target_data['Ki (nM)'].dropna()
          if len(ki_vals) > 0:
              if best_affinity is None or ki_vals.min() < best_affinity:
                  best_affinity = ki_vals.min()
                  best_type = 'Ki'
          
          ic50_vals = target_data['IC50 (nM)'].dropna()
          if len(ic50_vals) > 0:
              if best_affinity is None or ic50_vals.min() < best_affinity:
                  best_affinity = ic50_vals.min()
                  best_type = 'IC50'
          
          target_name = target_data['Target Name'].dropna().iloc[0] if len(target_data['Target Name'].dropna()) > 0 else 'Unknown'
          
          has_kinetics = target_data['kon (M-1-s-1)'].notna().any() or target_data['koff (s-1)'].notna().any()
          has_pdb = target_data['PDB ID(s) for Ligand-Target Complex'].notna().any()
          
          target_summary.append({
              'target_uniprot': target_id,
              'target_name': target_name,
              'measurement_count': len(target_data),
              'best_affinity_nm': best_affinity,
              'best_affinity_type': best_type,
              'has_kinetic_data': has_kinetics,
              'has_pdb_structure': has_pdb,
              'kd_count': len(kd_vals),
              'ki_count': len(ki_vals),
              'ic50_count': len(ic50_vals)
          })
      
      # Sort by best affinity (tightest binding first)
      target_summary_sorted = sorted(
          [t for t in target_summary if t['best_affinity_nm'] is not None],
          key=lambda x: x['best_affinity_nm']
      )
      
      print("Top targets (by best affinity):")
      for i, target in enumerate(target_summary_sorted[:10], 1):
          print(f"{i}. {target['target_name']} ({target['target_uniprot']})")
          print(f"   Best: {target['best_affinity_nm']:.2f} nM ({target['best_affinity_type']})")
          print(f"   Measurements: {target['measurement_count']} | Kinetics: {target['has_kinetic_data']} | PDB: {target['has_pdb_structure']}")
      
      results = {
          'compound_smiles': compound_smiles,
          'total_measurements': len(binding_data),
          'unique_targets': len(unique_targets),
          'targets_ranked': target_summary_sorted,
          'all_targets': target_summary,
          'best_target': target_summary_sorted[0] if target_summary_sorted else None
      }

  # Save results
  utils.save_json(results, f'{OUTPUT_DIR}/final_results.json')
  print(f"\n* Results saved to {OUTPUT_DIR}/final_results.json")
  ```

  **Key Advantages of SQLite SMILES Search**:
  -  Exact SMILES matching (precise, no false positives)
  -  Access to 640 fields including kinetics, thermodynamics, PDB structures
  -  <1ms query time
  -  Can filter by experimental conditions (pH, temperature)
  -  Complete citation information (PMID, DOI, patent numbers)

