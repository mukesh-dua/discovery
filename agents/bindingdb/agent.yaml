  ### Common Pitfalls to Avoid:

  1. **Missing imports**: Always import required libraries
     ```python
     import pandas as pd
     import time
     import os
     from bindingdb_utils import BindingDBUtils
     ```

  2. **Wrong database path**: Always use the absolute path `/app/bindingdb.db` (see CRITICAL: DATABASE PATH CONFIGURATION at the top).

  3. **Confusing BindingDB with ChEMBL data structures**: 
     - BindingDB uses `uniprot_id` for targets (not `chembl_id`)
     - SQLite columns include units and spaces: `Ki (nM)`, `Kd (nM)`, `IC50 (nM)`, `EC50 (nM)` (not lowercase `ki`/`kd`/`ic50`)

  4. **Type conversion - NO LONGER NEEDED!**:  The utility functions now **automatically convert numeric fields to proper types** (float). You can use DataFrame operations directly:
     ```python
     df = pd.DataFrame(binding_data)
     # NO conversion needed - Ki, Kd, IC50, EC50 are already float!
     mean_kd = df['Kd (nM)'].mean()
     high_affinity = df[df['Kd (nM)'] < 100]
     ```

  5. **Missing binding constant values**: Not all entries have all measurement types, filter first:
     ```python
     df_kd = df[df['Kd (nM)'].notna()]  # Only entries with Kd
     df_ki = df[df['Ki (nM)'].notna()]  # Only entries with Ki
     df_ic50 = df[df['IC50 (nM)'].notna()]  # Only entries with IC50
     ```

  6. **Using DataFrame.apply() with None values**: Always handle None when applying string methods:
     ```python
     # INCORRECT:
     df['has_pdb'] = df['PDB ID(s) for Ligand-Target Complex'].apply(lambda x: x.startswith('1'))  #  Error if None
     
     # CORRECT:
     df['has_pdb'] = df['PDB ID(s) for Ligand-Target Complex'].str.startswith('1', na=False)  #  pandas .str accessor
     # OR
     df['has_pdb'] = df['PDB ID(s) for Ligand-Target Complex'].apply(lambda x: x.startswith('1') if x else False)
     ```

  7. **Saving DataFrame data to JSON**: When converting DataFrames to dictionaries, use safe serialization:
     ```python
     # INCORRECT - produces invalid JSON with NaN:
     json.dump(df.to_dict(orient='records'), f, indent=2)
     
     # CORRECT - use utility's save_json:
     utils.save_json(df.to_dict(orient='records'), f'{OUTPUT_DIR}/results.json')
     ```

  8. **Comparing binding constants across units**: Ensure consistent units before comparison:
     ```python
     # BindingDB typically reports in nM
     import numpy as np
     df['pKd'] = -np.log10(df['Kd (nM)'] * 1e-9)  # Convert nM to M, then -log10
     ```

  9. **Accessing columns on empty or incomplete DataFrames**: Always check DataFrame state before filtering:
     ```python
     # INCORRECT - will raise KeyError if DataFrame is empty or column missing:
     high_affinity = df[df['Ki (nM)'].notna() & (df['Ki (nM)'] < 10)]  #  KeyError if 'Ki (nM)' doesn't exist
     
     # CORRECT - defensive approach:
     if not df.empty and 'Ki (nM)' in df.columns:
