  **Pattern 5: Comparing SMILES Affinities (SQLite) **
  ```python
  import pandas as pd
  from bindingdb_utils import BindingDBUtils

  OUTPUT_DIR = '/output'  # From dataHandlingContext
  utils = BindingDBUtils(sqlite_db_path="/app/bindingdb.db")

  smiles_to_compare = [
      "CC(C)C1=CC=C(C=C1)C(C)C(=O)NC2=CC=C(C=C2)C(=O)O",
      "CN(C)C(=O)CNC(=O)C1=CC=C(C=C1)NC(=O)C2=CC=CC=C2",
      "O=C(NC1=CC=CC=C1)C2=CC=C(C=C2)S(=O)(=O)N"
  ]

  binding_data = utils.get_binding_data_by_uniprot_sqlite('P00176', limit=10000)
  df = pd.DataFrame(binding_data)

  df_filtered = df[df['Ligand SMILES'].isin(smiles_to_compare)].copy()

  comparisons = []
  for smiles in smiles_to_compare:
      smiles_data = df_filtered[df_filtered['Ligand SMILES'] == smiles]
      
      if len(smiles_data) == 0:
          comparisons.append({
              'smiles': smiles,
              'found': False,
              'best_affinity_nm': None,
              'affinity_type': None
          })
          continue
      
      # Find best affinity across all measurement types
      best_affinity = None
      affinity_type = None
      
      for col, name in [('Ki (nM)', 'Ki'), ('Kd (nM)', 'Kd'), ('IC50 (nM)', 'IC50')]:
          values = smiles_data[col].dropna()
          if len(values) > 0:
              min_val = values.min()
              if best_affinity is None or min_val < best_affinity:
                  best_affinity = min_val
                  affinity_type = name
      
      comparisons.append({
          'smiles': smiles,
          'ligand_name': smiles_data['BindingDB Ligand Name'].iloc[0] if len(smiles_data) > 0 else None,
          'found': True,
          'measurement_count': len(smiles_data),
          'best_affinity_nm': float(best_affinity) if best_affinity else None,
          'affinity_type': affinity_type,
          'has_kinetics': smiles_data['kon (M-1-s-1)'].notna().any() or smiles_data['koff (s-1)'].notna().any(),
          'has_pdb': smiles_data['PDB ID(s) for Ligand-Target Complex'].notna().any()
      })

  found_comparisons = [c for c in comparisons if c['found'] and c['best_affinity_nm']]
  found_comparisons.sort(key=lambda x: x['best_affinity_nm'])

  results = {
      'target_uniprot': 'P00176',
      'total_requested': len(smiles_to_compare),
      'found_with_data': len(found_comparisons),
      'best_affinity_nm': found_comparisons[0]['best_affinity_nm'] if found_comparisons else None,
      'comparisons_ranked': found_comparisons,
      'all_comparisons': comparisons
  }

  utils.save_json(results, f'{OUTPUT_DIR}/final_results.json')
  print(f"* Found {len(found_comparisons)}/{len(smiles_to_compare)} compounds with binding data")
  if found_comparisons:
      print(f"Best binder: {found_comparisons[0]['best_affinity_nm']:.2f} nM ({found_comparisons[0]['affinity_type']})")
  ```

