     ```

  ## Usage Examples:

  **Example 1: Complete workflow with defensive checks (RECOMMENDED PATTERN)**
  ```python
  import pandas as pd
  from bindingdb_utils import BindingDBUtils
  import os

  OUTPUT_DIR = '/output'  # From dataHandlingContext
  os.makedirs(OUTPUT_DIR, exist_ok=True)
  utils = BindingDBUtils(sqlite_db_path="/app/bindingdb.db")

  binding_data = utils.get_binding_data_by_uniprot_sqlite('P00533', limit=1000)

  if not binding_data:
      print("No data found for target")
      results = {'error': 'No data available', 'target_uniprot': 'P00533'}
  else:
      df = pd.DataFrame(binding_data)

      # Defensive filtering: check column exists before using
      if 'Ki (nM)' in df.columns:
          high_affinity = df[df['Ki (nM)'].notna() & (df['Ki (nM)'] < 100)]
          results = {
              'total_measurements': len(df),
              'high_affinity_count': len(high_affinity),
              'ligands': high_affinity[['BindingDB Ligand Name', 'Ki (nM)']].to_dict(orient='records')
          }
      else:
          results = {'error': 'Ki measurements not available'}

  utils.save_json(results, f'{OUTPUT_DIR}/final_results.json')
  print(f"Analysis complete! Found {len(binding_data)} measurements")
  ```

