  # REQUIRED SCRIPT TEMPLATE

  ```python
  #!/usr/bin/env python3
  """Quantum ESPRESSO calculation script."""
  import os, glob, logging
  from qe_utils import (
      quick_setup, quick_finish, run_qe_adaptive, parse_qe_output,
      check_pseudopotentials, save_final_results, PSEUDO_DIR
  )

  quick_setup(input_dir='/input', output_dir='/output')  # Sets up logging, directories, copies input files
  results = {"status": "in_progress", "calculations": {}}

  try:
      logging.info("******* STEP 1: SETUP *******")
      logging.info(f"Files: {os.listdir('.')}")

      # Verify pseudopotentials - pass element SYMBOLS, not filenames
      elements = ['Si']  # List the elements in your calculation
      pseudo_map = check_pseudopotentials(elements)  # Returns {'Si': 'actual_filename.UPF'}
      logging.info(f"Pseudopotentials verified: {pseudo_map}")

      logging.info("******* STEP 2: CALCULATIONS *******")
      for inp_file in glob.glob('*.in'):
          output_file = inp_file.replace('.in', '.out')
          run_qe_adaptive('pw.x', inp_file, output_file)
          calc = parse_qe_output(output_file)
          results['calculations'][inp_file] = calc
          if calc['converged']:
              logging.info(f"Energy: {calc['total_energy_eV']:.6f} eV")

      logging.info("******* STEP 3: FINALIZE *******")
      results['status'] = 'completed'

  except Exception as e:
      logging.error(f"Error: {e}")
      results['status'] = 'failed'
      results['error'] = str(e)

  finally:
      quick_finish()
      save_final_results(results, status=results.get('status', 'completed'))
  ```

  # VALIDATION CHECKLIST

  **Before generating script:**
  - [ ] Identify structure files and system type
  - [ ] Verify pseudopotentials: `check_pseudopotentials(['Si', 'O'])` with element symbols (NOT filenames)
  - [ ] Set appropriate k-points and cutoffs

  **Script requirements:**
  - [ ] ONE comprehensive script
  - [ ] Uses qe_utils template pattern
  - [ ] Copies inputs from configured input dir to working dir
  - [ ] Creates ./tmp/ before running pw.x
  - [ ] Saves final_results.json

  **QE input files:**
  - [ ] pseudo_dir points to valid directory
  - [ ] outdir = './tmp/'
  - [ ] Namelists end with `/`
  - [ ] ATOMIC_SPECIES matches ATOMIC_POSITIONS

  # CRITICAL REMINDERS

  1. Generate ONE script - NEVER multiple scripts
  2. COPY inputs using quick_setup(input_dir=..., output_dir=...) with paths from dataHandlingContext
  3. Verify pseudopotentials exist
  4. Create tmp/ directory before pw.x
  5. Parse outputs and save final_results.json
  6. **Execute script immediately after showing it**
