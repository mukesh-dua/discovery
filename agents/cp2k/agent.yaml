  # KEY CP2K PARAMETERS

  | Parameter | Default | Range | Notes |
  |-----------|---------|-------|-------|
  | cutoff (Ry) | 300 | 300-800 | Plane wave cutoff, test convergence |
  | rel_cutoff (Ry) | 60 | 40-80 | Multi-grid relative cutoff |
  | scf_convergence | 1e-6 | 1e-5 to 1e-8 | SCF convergence threshold |
  | max_scf | 50 | 50-500 | Max SCF iterations |

  # CUTOFF CONVERGENCE TESTING (MANDATORY FOR PRODUCTION)

  For any production calculation, ALWAYS run a cutoff convergence test first.
  The default cutoff=300 Ry is a quick-test value. **Use cutoff=400 Ry minimum for production.**

  **Recipe**: Test cutoffs [300, 400, 500, 600, 800] Ry on your system:
  ```python
  cutoffs = [300, 400, 500, 600, 800]
  energies_eV = []
  for cut in cutoffs:
      inp = generate_input('conv_test', 'ENERGY', structure,
                           dft_params={'cutoff': cut})
      write_input_file(inp, f'test_{cut}.inp')
      result = run_cp2k(f'test_{cut}.inp')
      parsed = parse_cp2k_output(f'test_{cut}.out')
      energies_eV.append(parsed['total_energy_eV'])
  conv = compute_convergence(cutoffs, energies_eV, threshold=0.001)
  # Use the lowest cutoff where deltaE < 1 meV/atom
  ```

  **Guidelines by system type:**
  | System | Recommended cutoff (Ry) | Notes |
  |--------|------------------------|-------|
  | Quick test / debugging | 300 | Not for publication |
  | Molecules, GGA | 400 | Standard production |
  | Bulk crystals, GGA | 400-500 | Depends on elements |
  | Hybrid DFT (future, when re-enabled) | 500-600 | HF exchange needs higher cutoff |
  | Stress tensor / CELL_OPT | 600-800 | Stress converges slowly with cutoff |
  | First-row elements (Li, Be, B) | 600+ | Hard pseudopotentials need high cutoff |

  # COMMON ERRORS AND SOLUTIONS

  | Error | Cause | Solution |
  |-------|-------|----------|
  | SCF not converged | Difficult system | Increase max_scf, try smaller mixing alpha |
  | Basis set not found | Wrong name | Use list_basis_sets() to check, use MOLOPT sets |
  | CELL too small | Insufficient vacuum | Add >= 6 Angstrom vacuum for non-periodic |
  | Segfault in MD | Memory/timestep | Reduce timestep, check OMP_STACKSIZE |
  | OT fails | Metallic system | Use smearing=True in dft_params |
  | "Use the LSD option for an odd number of electrons" | Odd valence electron count with RKS | Set multiplicity=2 and uks=True, or let generate_input() auto-detect |
  | FileNotFoundError in parse_cp2k_output | Missing `.out` extension | Pass `'water.out'` not `'water'`. The function does NOT auto-append extensions. |
  | KeyError `'conserved'` from parse_md_output | Wrong key name | The correct key is `conserved_quantities` (not `conserved`). Full keys: steps, n_steps, temperatures, energies, potential_energies, kinetic_energies, conserved_quantities, conserved_drift_hartree, avg_temperature, std_temperature |
  | generate_input() result used as file path | Returns string content, not a file | Call `write_input_file(content, 'file.inp')` to save the returned string to disk |

  # NON-PERIODIC MOLECULE SETTINGS

  For isolated molecules (gas phase), set in structure dict:
  - periodic='NONE'
  - cell=[L,L,L] where L = molecule extent + 12 Angstrom (or omit to auto-generate)
  The generate_input function automatically:
  1. Adds `&POISSON PERIODIC NONE POISSON_SOLVER WAVELET &END POISSON` for PERIODIC NONE
  2. Centers coordinates in the cell box ONLY when the cell is auto-generated (no explicit cell provided).
     If you provide an explicit cell, coordinates are left unchanged -- position atoms in the cell yourself.
  3. Auto-generates a padded cubic cell (10 Angstrom vacuum) if no cell is provided
  4. Detects odd electron count and enables UKS automatically

  # PSEUDOPOTENTIAL + BASIS SET MATCHING

  Always match pseudopotential family with functional family.
  Default: potential='GTH-PBE' with basis_set='DZVP-MOLOPT-SR-GTH'.
  Use GTH-PBE for PBE; for BLYP/BP86/PADE choose the matching GTH family. Hybrids are disabled in v19.

  # run_cp2k() vs run_cp2k_mpi() -- DECISION RULE

  Signatures are in the LIBRARY REFERENCE. Both return `CompletedProcess` (do NOT raise --
  check `.returncode == 0`).

  - **d96/d32/HPC SKUs: prefer `run_cp2k_mpi()`** -- auto-selects MPI ranks with ~4 OMP threads/rank and reserves 1 core; no fixed 24-rank cap in current v19 utilities.
  - **d4/d8 (4-8 cores): `run_cp2k()`** -- MPI overhead not worth it at low core counts.
  - OMP-only scaling plateaus at ~16 threads (max ~2x speedup); MPI continues to scale.
  - Container-safe MPI is enabled internally (`OMPI_MCA_btl_vader_single_copy_mechanism=none`) to avoid CMA bus errors.
  - **Auto-fallback**: `run_cp2k_mpi()` falls back to OMP-only if `cp2k.psmp` + `mpirun` are unavailable -- safe to call unconditionally.

  **CRITICAL**: `run_cp2k()` takes `nthreads`, NOT `nprocs`. `run_cp2k_mpi()` takes
  `nprocs`, NOT `nthreads`. Separate functions, separate parallelism models.

  # RESTART AND MULTI-STEP WORKFLOWS

  For chaining calculations (e.g., GEO_OPT -> VIBRATIONAL_ANALYSIS), use restart files
  to avoid recomputing the wavefunction from scratch:

  ```python
  # Step 1: Geometry optimization
  result1 = run_cp2k_mpi('geo_opt.inp')
  restart_files = find_restart_files('geo_opt')

  # Step 2: Use converged wavefunction for vibrational analysis
  if restart_files['wfn']:
      vib_input = generate_restart_input(
          'geo_opt.inp', restart_files['wfn'],
          project_name='vib', run_type='VIBRATIONAL_ANALYSIS'
      )
      write_input_file(vib_input, 'vib.inp')
      result2 = run_cp2k_mpi('vib.inp')
  ```

  This saves significant time because `SCF_GUESS RESTART` converges in 1-3 SCF cycles
  instead of 10-50 with `SCF_GUESS ATOMIC`.

  # ADMM FOR AFFORDABLE HYBRID DFT

  Not actionable in v19: hybrid DFT is disabled (see top-of-file note). When hybrid DFT is
  re-enabled, ADMM auto-configuration of the auxiliary basis set still needs to be added to
  `generate_input()`.

  # PLATFORM LIMITATIONS & KNOWN ISSUES

  - **Single-node only**: The current container runs with `pool_size=1` (no InfiniBand).
  - **No GPU acceleration**: The current build is CPU-only. GPU-accelerated CP2K (DBCSR + CUDA)
    is not yet available on this platform.
  - **Very large systems (>1000 atoms)**: consider LAMMPS or GROMACS with classical forcefields
    for equilibration, then CP2K for DFT refinement on a representative snapshot.
  # ADVANCED CAPABILITIES (CP2K 2024.x)

  The container ships CP2K >=2024.1 with these capabilities:
  - **D4 dispersion** (`dispersion='D4'`): More accurate than D3/D3BJ, recommended for new work.
    Natively supported via libdftd4. Use `dft_params={'dispersion': 'D4'}`.
  - **GW approximation**: Quasiparticle band structures via `&PROPERTIES > &BANDSTRUCTURE > &GW`
  - **Bethe-Salpeter Equation (BSE)**: Optical absorption spectra
  - **TDDFT**: Time-dependent DFT for excited states via `&PROPERTIES > &TDDFPT`
  - **Per-element basis sets**: Use `structure['element_basis_sets']` dict
    (e.g., TZV2P on metal, DZVP on ligands)

  # HANDLING ODD-ELECTRON / OPEN-SHELL SYSTEMS

  - `generate_input()` auto-detects odd valence electron count and enables `UKS .TRUE.` with `multiplicity=2`. To override: set `structure['multiplicity']` and `dft_params['uks']=True`.
  - Smearing is NOT auto-enabled for UKS (would introduce unphysical fractional occupation in molecular radicals). Enable explicitly for metallic / near-degenerate cases via `dft_params['smearing']=True`.
  - Inconsistent electron-count / multiplicity combinations log a warning.

