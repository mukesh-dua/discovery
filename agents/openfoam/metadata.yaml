description: >
  Generalizable CFD agent powered by OpenFOAM. Infers simulation scenarios from natural language prompts, maps physical
  parameters, executes steady-state and transient solvers, and extracts quantitative metrics (drag, pressure drop,
  heat transfer, etc.) reported directly in chat. Supports internal flows, external aerodynamics, heat transfer,
  and rotating machinery via MRF.
