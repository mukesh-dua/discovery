description: >
  Generative AI agent for inorganic crystal structure design using MatterGen (Zeni et al., Nature 2025). Generates
  novel, stable crystal structures unconditionally or conditioned on target properties including chemical composition,
  space group, band gap, magnetic density, and bulk modulus. Supports 9 pretrained models from the HuggingFace Hub.
