<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Browser window frame -->
  <rect x="2" y="3" width="20" height="18" rx="2" ry="2" stroke="#e95420" fill="#fff"/>
  
  <!-- Browser top bar -->
  <line x1="2" y1="7" x2="22" y2="7" stroke="#e95420"/>
  
  <!-- Browser dots -->
  <circle cx="5" cy="5" r="0.5" fill="#e95420"/>
  <circle cx="7" cy="5" r="0.5" fill="#e95420"/>
  <circle cx="9" cy="5" r="0.5" fill="#e95420"/>
  
