  <path d="M 7 11 L 5 14 L 7 17" stroke="#e95420" stroke-width="1.5" fill="none"/>
  <path d="M 17 11 L 19 14 L 17 17" stroke="#e95420" stroke-width="1.5" fill="none"/>
  
