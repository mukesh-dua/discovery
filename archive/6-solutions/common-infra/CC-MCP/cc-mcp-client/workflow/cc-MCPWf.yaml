name: cc-MCPWf
states:
  - name: Planning  
    actors:
      - agent: cc-MCPAgent
        inputs:
          userGoal: userGoal
          dataHandlingContext: dataHandlingContext
          messageId: messageId
          nodePoolContext: nodePoolContext
          agentTeam: agentTeam
          workflowContext: workflowContext
        thread: MainThread
        humanInLoopMode: onNoMessage
        streamOutput: true
        maxTurn: 10
        maxTransientErrorRetries: 3
        maxRateLimitRetries: 3
    isFinal: false

  - name: Display
    actors:
      - agent: cc-MCPDisplayAgent
        inputs:
          userGoal: userGoal
          agentTeam: agentTeam
          messageId: messageId
          nodePoolContext: nodePoolContext
          dataHandlingContext: dataHandlingContext
        thread: MainThread
        humanInLoopMode: never
        streamOutput: true
        maxTurn: 10
        maxTransientErrorRetries: 3
        maxRateLimitRetries: 3
    isFinal: false

  - name: End
    actors: []
    isFinal: true

transitions:
  - from: Planning
    to: Display
  - from: Display
    to: End

variables:
  - Type: thread
    name: MainThread
  - Type: userDefined
    name: userGoal
  - Type: userDefined
    name: nodePoolContext
  - Type: userDefined
    name: messageId
  - Type: userDefined
    name: workflowContext
    value: "
      # Workflow Context:
      You are part of a team of AI agents working together to perform HPC workload management and file operations using the MCP client tool.

      ## Workflow specific rules and guidlines
      - *Important* You should only perform actions which have been assigned to you in the plan.
      - If there is a tool available that can accomplish your step, you should use it, making sure to follow the instructions to use it precisely.
      - It is ok to not know the answer, if you don't know the answer to something or you have no tools to accomplish the given task, you may respond accordingly.
      - *Important* you should never hallucinate any tool invocations.
      "
  - Type: userDefined
    name: dataHandlingContext
    value: "
      GUIDELINES:
      - Virtual path: System-assigned absolute namespace for passing data between steps.
      - Container path: Absolute path inside the tool container. (e.g., `/app/outputs`).
      - Mapping: Tool reads/writes container (mount) path → system maps to virtual path.
      - Implicit extension: If `/step0/app/outputs` exists, `/step0/app/outputs/report.txt` is valid.
      - No shortening virtual paths: Implied 'shortening' is disallowed.

      **Global Rules**
      1. ALL paths must be ABSOLUTE. Never use relative paths.
      2. Retrieve current data context before any action.
      3. Preview data before updating descriptions.
      4. Update virtualPath description **before** promoting to data asset (or description won’t propagate).
      5. Promote only final outputs for end user; intermediate results don’t need promotion.

      ---

      **Tool Mount Rules**
      - `outputMounts` = absolute container path where tool stores outputs.  Only directories are permitted.
      - `inputMounts` = array of `{ virtualPath: <virtual path>, inputMountPath: <absolute container path> }`. Files or directories are permitted. The mount path will be of the type (file/directory) that is keyed by the virtual path given.

      ---

      **Example Flow**
      1. Tool writes `report.txt` to `/app/outputs` (container path).
      2. System maps to virtual path `/step0/app/outputs`.
      3. Update description for `/step0/app/outputs`.
      4. Next tool mounts `/step0/app/outputs` as `virtualPath`; `inputMountPath = /app/inputs`.
      ```json
      inputMounts: [ { virtualPath: /step0/app/outputs, inputMountPath: /app/inputs } ]
      ```
      5. Tool produces `step1/app/outputs`
      6. Update description of `step1/app/outputs`
      7. Promote `step1/app/outputs`"
  - Type: userDefined
    name: agentTeam
    value: |-
      Agent team composition:
      1. cc-MCPAgent - Can manage and dispatch HPC workloads to an MCP server that works with Cyclecloud using SLURM.
         Capabilities: Can issue SLURM commands to interact with the HPC cluster on behalf of the user and run limited file and system operations.
      2. cc-MCPDisplayAgent - Interprets JSON output and provides human readable final responses to users.
         Capabilities: Provide comprehensive, user-friendly responses, and highlight key findings and data assets created.
startstate: Planning
