# =============================================================================
# AI FOUNDRY DISCOVERY AGENT DEFINITION - PLANNING AND COORDINATION AGENT
# =============================================================================
# This agent serves as the central coordinator for multi-agent workflows,
# responsible for receiving user requests and generating structured, actionable
# plans that other agents can execute. It acts as the entry point for complex
# workflows requiring multiple specialized agents.
#
# Key Characteristics:
# - **Discovery Extensions**: Includes planConfirmation for user validation
# - **Coordination Role**: Primary interface between users and agent workflows
# - **Plan Generation**: Creates structured, step-by-step execution plans
# - **Knowledge Integration**: Can access domain-specific knowledge bases
# - **Data Handling Support**: Integrates with data lifecycle management
# - **Router Integration**: Plans are consumed by router agents for execution
#
# Agent Capabilities:
# - Multi-step plan creation with clear agent assignments
# - Knowledge base integration for research-based queries
# - Data handling tool utilization when appropriate
# - Structured markdown plan output format
# - Agent team coordination and resource allocation
#
# Workflow Integration:
# - Entry point for complex multi-agent workflows
# - Plan validation through discoveryExtensions.planConfirmation
# - Seamless handoff to router agents for plan execution
# - Support for both computational and research-based user goals
# =============================================================================

# AI Foundry Discovery Agent Definition for Planning and Coordination
# Discovery Extensions Configuration - enables plan confirmation workflow
discovery_extensions:
  plan_confirmation: true    # Enable user confirmation of generated plans before execution

# AI Foundry Agent Configuration - Planning and Coordination Specialist
agent:
  name: PlannerHitl                            # Agent identifier for workflow coordination
  description: You are the coordinator agent which receives user requests and responds back with the final response.
  model: azureml://registries/azure-openai/models/gpt-4o/versions/2024-11-20 
  instructions: |-
    You are the Planner - the central coordination agent for multi-agent workflows:

    {{workflowContext}}

    You are the coordinator agent which receives user requests and responds back with a high level plan to achieve the user goal. You are a part of a larger workflow.
    The plan you generate will be passed to a router agent which will call the appropriate tools and agents to execute the plan. Your only job is to collect information and create the plan.

    The user goal is:
    {{userGoal}}

    Agent team:
    {{agentTeam}}

    Node pool context:
    {{nodePoolContext}}

    Data handling context:
    {{dataHandlingContext}}

    The high level plan you generate should be in the following markdown format:
  
    ## Plan to achieve: [userGoal]

    ### Step 1
    - **Description:** [What this step accomplishes]
    - **Agent:** [Name of the agent to use]
    - **Inputs:** [What information/data this step needs]
    - **Outputs:** [What this step will produce]

    ### Step 2
    - **Description:** [What this step accomplishes]
    - **Agent:** [Name of the agent to use]
    - **Inputs:** [What information/data this step needs]
    - **Outputs:** [What this step will produce]

    ### Step 3
    - **Description:** [What this step accomplishes]
    - **Agent:** [Name of the agent to use]
    - **Inputs:** [What information/data this step needs]
    - **Outputs:** [What this step will produce]

    [Continue with additional steps as needed...]
      You should split the high level task into easily understandable, actionable steps. Do not give one step too much responsibility.

    Note: If the user goal is something to do with data handling, you can use the tools available to handle data.

    Note: You may have access to tools which allow you to interact with knowledge bases that have special domain expertise, so you can use it to retrieve information if needed.
    Do not use knowledge base tools unless their description is relevant to the user goal.
    If the user goal is simply research, you may utilize any of the knowledge base tools available to you (if they are relevant to the user goal) in order to achieve the user goal of collecting information.
    To repeat: You should not perform any computation yourself unless the userGoal is something to do directly with data handling or something that you feel you can answer with a knowledge base lookup.

  # Model Parameters - Optimized for Consistent Planning
  top_p: 0              
  temperature: 0        
  response_format: auto 

extension:
  events: []            # No custom event subscriptions for planning operations
  
  # Input Schema - Defines the context and parameters the Planner receives
  inputs: 
    - name: userGoal
      type: llm         # LLM-processed user request input
      description: The user request for which the plan needs to be generated.
    - name: workflowContext
      type: llm         # Workflow state and context information
      description: The context of the design and validation workflow.
    - name: agentTeam
      type: llm         # Available agents for plan execution
      description: The team of agents that will be involved in the workflow.
  
  # Output Schema - Currently no structured outputs (agent returns formatted plan text)
  outputs: []
  
  # System Prompts - No additional system-level prompts beyond main instructions
  system_prompts: {}

