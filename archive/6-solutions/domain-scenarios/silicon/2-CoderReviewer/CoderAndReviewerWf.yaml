name: CoderAndReviewerWf
# =============================================================================
# CODE GENERATION AND REVIEW WORKFLOW
# =============================================================================
# This workflow orchestrates a two-stage process combining code generation and
# code review capabilities. The Coder agent generates high-quality code across 
# multiple programming languages, followed by the CodeReviewer agent which 
# provides comprehensive quality analysis, bug detection, and improvement
# suggestions.
#
# Workflow Architecture:
# 1. CoderEntryPoint: Multi-language code generation using Coder agent
# 2. CodeReview: Comprehensive code quality analysis using CodeReviewer agent  
# 3. End: Workflow completion with validated, reviewed code output
#
# Supported Languages: Python, Verilog, SystemVerilog, JavaScript, JSON,
# YAML, XML, C, CPP, Java, Markdown
#
# Key Features:
# - Automated code generation from user requirements
# - Professional code review and quality assessment
# - Multi-language support for diverse development needs
# - Integrated data handling and lifecycle management
# =============================================================================


states:
# ---------------------------------------------------------------------------
# STAGE 1: CODE GENERATION ENTRY POINT
# ---------------------------------------------------------------------------
# Initial state that processes user requirements and generates appropriate code
# using the Coder agent's multi-language capabilities. Handles comprehensive
# code generation requests with integrated data lifecycle management.
# ---------------------------------------------------------------------------
- name: CoderEntryPoint
  actors:
    - agent: Coder                          # Multi-language code generation agent
      inputs:
        userGoal: userGoal                    # User's code generation request and specifications
        nodePoolContext: nodePoolContext     # Compute resource allocation and environment
        messageId: messageId                  # Message tracking identifier for request correlation
        dataHandlingContext: dataHandlingContext  # Data processing and lifecycle capabilities
      thread: MainThread                     # Primary execution thread for code generation
      humanInLoopMode: never                # Fully automated execution without human intervention
      streamOutput: true                    # Enable real-time output streaming for progress monitoring
  isFinal: false                           # Intermediate state - workflow continues to review

# ---------------------------------------------------------------------------
# STAGE 2: CODE QUALITY REVIEW AND ANALYSIS
# ---------------------------------------------------------------------------
# Secondary state that performs comprehensive code review on the generated code.
# The CodeReviewer agent analyzes code quality, identifies bugs, suggests
# improvements, and ensures adherence to coding standards.
# ---------------------------------------------------------------------------
- name: CodeReview
  actors:
    - agent: CodeReviewer                   # Specialized code review and analysis agent
      inputs:
        nodePoolContext: nodePoolContext     # Compute resource allocation for review processing
        messageId: messageId                  # Message tracking identifier for correlation
        dataHandlingContext: dataHandlingContext  # Data access for code analysis
      thread: MainThread                     # Same execution thread for context continuity
      humanInLoopMode: never                # Automated review without human intervention
      streamOutput: true                    # Real-time streaming of review analysis
  isFinal: false                           # Intermediate state - proceeds to completion   
   
# ---------------------------------------------------------------------------
# STAGE 3: WORKFLOW COMPLETION STATE
# ---------------------------------------------------------------------------
# Terminal state indicating successful completion of both code generation
# and code review processes. At this point, the workflow has produced 
# reviewed, validated code ready for deployment or further processing.
# ---------------------------------------------------------------------------
- name: End
  actors: []                              # No agents execute in terminal state
  isFinal: true                           # Marks successful workflow completion

transitions:
# =============================================================================
# WORKFLOW STATE TRANSITIONS - TWO-STAGE PROCESSING PIPELINE
# =============================================================================
# Sequential execution flow: Code Generation → Code Review → Completion
# This ensures all generated code undergoes professional review before
# workflow completion, maintaining high quality standards.
# =============================================================================
- from: CoderEntryPoint                    # Source: Initial code generation state
  to: CodeReview                           # Target: Code review and analysis state
- from: CodeReview                         # Source: Code review completion
  to: End                                  # Target: Successful workflow termination 
# =============================================================================
# WORKFLOW VARIABLES DEFINITION - CODE GENERATION AND REVIEW CONTEXT
# =============================================================================
# Variables provide comprehensive context and configuration for both the Coder
# and CodeReviewer agents. These include user requirements, execution context,
# resource allocation, and advanced data handling capabilities
# =============================================================================

variables:
  # ---------------------------------------------------------------------------
  # CORE EXECUTION VARIABLES
  # ---------------------------------------------------------------------------
  # Essential variables for workflow orchestration and agent communication
  # across both code generation and review stages
  # ---------------------------------------------------------------------------
  - Type: thread
    name: MainThread                        # Primary execution thread shared between all workflow states
  - Type: userDefined
    name: userGoal                          # User's detailed code generation requirements and specifications
  - Type: userDefined
    name: nodePoolContext                   # Compute resource allocation and environment context for processing
  - Type: userDefined
    name: messageId                         # Unique identifier for request tracking, logging, and correlation
  - Type: userDefined
    name: dataHandlingContext              # Comprehensive data lifecycle management and processing capabilities
    value: "In order to interact with data (inputs, outputs) you will utilize the following tools and guidelines.
      ## OBJECTIVE (Data Lifecycle Support)
      To support your primary task, you must also ensure that the data lifecycle is handled appropriately by executing the following capabilities.
      ## CAPABILITIES
      - **Preview Data**: Use the `PreviewData` tool to generate a preview of data located at a path. This path may be a file or a directory, but it must always be an absolute path.
      - **Promote Outputs**: Use `PromoteOutputsToDataAssets` to move validated files from a working directory into the `/outputs` directory. Only promote files that are complete and verified.  
      - **Get Data Context**: Use `GetDataContext` to retrieve the current structure and metadata of a virtual directory. This helps determine the current state of data and decide on next actions.  
      - **Update Data Description**: Use `UpdateDataDescription` to attach or modify the description of any directory or file that exists in the data context. Always provide meaningful, transformation-related metadata.
      ## GUIDELINES
      - To learn what data is available (and where), you MUST call the `GetDataContext` tool to retrieve the current state of the data.
      - Always operate using the most recent data context.  
      - Preview data before updating descriptions or promoting to outputs.  
      - Maintain consistency in metadata and file paths.  
      - Avoid redundant promotions or updates unless the underlying data has changed.
      - Only call data handling tools when necessary.
      - Promoted data will be visible by the end user, so ensure you are only promoting data that is relevant to the user goal.
      - IMPORTANT: Always update the description of a virtualPath BEFORE promoting it to a data asset. This description will be available to the user once it is promoted, so ensure it is descriptive and readable.
      
      Note: For tools that have outputMounts and inputMounts as input parameters follow these guidelines:
      - outputMounts should be set to the absolute path of where the output data from the execution of a tool should be stored.
      - inputMounts should be an object mapping of the virtual mount path you want mounted to the ABSOLUTE path of where you want it to be located on the tool container

      WARNING: ALL DATA HANDLING PATHS ARE ABSOLUTE PATHS, NEVER PASS A RELATIVE PATH TO ANYTHING

      An example of a data handle flow would be as follows:
      1. Call some tool which generates output data in a file 'report.txt' in a directory called /app/outputs. This is what you would set as the outputMountPath
      2. Use updatesDataDescription to add a description to the virtual directroy /app/outputs which says that the directory contains a file 'report.txt'
      3. Tool two will mount the directory /app/outputs as the virtualPath parameter for the inputMounts parameter, and the absolute path of where the data is located in the tool container as the inputMountPath. inputMounts will be an array of these objects.
          - inputMounts: [{ virtualPath: '/step0/app/outputs', inputMountPath: '/app/inputs' }]
        - NOTICE, we did not specify a file path, we specified a directory path, this is because the tool will mount the entire directory and not just a file.
      4. The tool will then generate a file 'report2.txt' in the /app/outputs directory, which is the outputMountPath.
      5. You will then use the PreviewData tool to preview the data in the /app/outputs directory.
      6. If the data is valid, you will then use the PromoteOutputsToDataAssets tool to promote
        the /app/outputs directory to the /outputs directory, which is where all final outputs"


# =============================================================================
# WORKFLOW ENTRY POINT CONFIGURATION
# =============================================================================
# Defines the initial state where the code generation and review workflow
# execution begins. The workflow starts with code generation and proceeds
# through review to ensure high-quality output.
# =============================================================================

startstate: CoderEntryPoint                # Workflow begins with code generation stage