name: CoderWithSaveToolWf
# =============================================================================
# MULTI-LANGUAGE CODE GENERATION WORKFLOW WITH FILE SAVING
# =============================================================================
# This workflow orchestrates the CoderWithSaveTool agent to generate high-quality code
# across multiple programming languages including Python, Verilog, SystemVerilog,
# JavaScript, JSON, YAML, XML, C, CPP, Java, and Markdown with automatic file
# saving capabilities using proper naming conventions and file extensions.
# =============================================================================


states:
# ---------------------------------------------------------------------------
# CODE GENERATION ENTRY POINT
# ---------------------------------------------------------------------------
# Main state that processes user requests and generates appropriate code
# using the CoderWithSaveTool agent's multi-language capabilities with
# built-in file saving functionality
# ---------------------------------------------------------------------------
- name: CoderEntryPoint
  actors:
    - agent: CoderWithSaveTool
      inputs:
        userGoal: userGoal                    # User's code generation request
        nodePoolContext: nodePoolContext     # Compute resource allocation
        messageId: messageId                  # Message tracking identifier
        dataHandlingContext: dataHandlingContext  # Data processing capabilities
      thread: MainThread                     # Primary execution thread
      humanInLoopMode: never                # Automated execution without human intervention
      streamOutput: true                    # Enable real-time output streaming
  isFinal: false                           # Not a terminal state

# ---------------------------------------------------------------------------
# WORKFLOW COMPLETION STATE
# ---------------------------------------------------------------------------
# Terminal state indicating successful completion of code generation and file saving
# ---------------------------------------------------------------------------
- name: End
  actors: []                              # No agents execute in end state
  isFinal: true                           # Marks workflow completion

transitions:
# =============================================================================
# WORKFLOW STATE TRANSITIONS
# =============================================================================
# Simple linear flow: Code generation with file saving → Completion
# =============================================================================
- from: CoderEntryPoint                    # Source state: code generation with file saving
  to: End                                  # Target state: workflow completion

# =============================================================================
# WORKFLOW VARIABLES DEFINITION
# =============================================================================
# Variables provide context and configuration for the CoderWithSaveTool agent operation.
# These include user requests, execution context, and data handling capabilities
# for code generation with automatic file saving functionality.
# =============================================================================

variables:
  # ---------------------------------------------------------------------------
  # CORE WORKFLOW VARIABLES
  # ---------------------------------------------------------------------------
  # Essential variables for workflow execution and agent communication
  # ---------------------------------------------------------------------------
  - Type: thread
    name: MainThread                        # Primary execution thread for code generation with file saving
  - Type: userDefined
    name: userGoal                          # User's code generation request and requirements
  - Type: userDefined
    name: nodePoolContext                   # Compute resource allocation and environment context
  - Type: userDefined
    name: messageId                         # Unique identifier for request tracking and logging
  - Type: userDefined
    name: dataHandlingContext
    value: "
      GUIDELINES:
     
      **Definitions**
      - **Virtual path**: System-assigned absolute namespace for passing data between steps (e.g., `/step0/app/outputs`). Not the container's real filesystem path.
      - **Container path**: Absolute path inside the tool container (e.g., `/app/outputs`). Used only in `outputMounts` and `inputMountPath`.
      - **Mapping**: Tool reads/writes container (mount) path → system maps to virtual path. Pass **virtual path** downstream, not container path.
      - **Implicit extension**: If `/step0/app/outputs` exists, `/step0/app/outputs/reports` is valid (assuming 'reports' exists in the data pointed to by `/step0/app/outputs`.  Make extension explicit by giving the implicit path a description.
      -**No shortening virtual paths**: Implied 'shortening' is disallowed (So if you had `/step0/app/outputs/reports` as the only item in the context, shortening it to just `/step0/app/outputs` would not be valid).
      ---
     
      **Global Rules**
      1. ALL paths must be ABSOLUTE. Never use relative paths.
      2. Retrieve current data context before any action.
      3. Preview data before updating descriptions.
      4. Update virtualPath description **before** promoting to data asset (or description won't propagate).
      5. Promote only final outputs for end user; intermediate results don't need promotion.
     
      ---
     
      **Tool Mount Rules**
      - `outputMounts` = absolute container path where tool stores outputs.  Only directories are permitted.
      - `inputMounts` = array of `{ virtualPath: <virtual path>, inputMountPath: <absolute container path> }`. Files or directories are permitted. The mount path will be of the type (file/directory) that is keyed by the virtual path given.
     
        ---
       
        **Example Flow**
        1. Tool writes `report.txt` to `/app/outputs` (container path).
        2. System maps to virtual path `/step0/app/outputs`.
        3. Update description for `/step0/app/outputs`.
        4. Next tool mounts `/step0/app/outputs` as `virtualPath`; `inputMountPath = /app/inputs`.
        ```json
        inputMounts: [ { virtualPath: /step0/app/outputs, inputMountPath: /app/inputs } ]
        ```
        5. Tool produces `step1/app/outputs`
        6. Update description of `step1/app/outputs`
        7. Promote `step1/app/outputs`"
# =============================================================================
# WORKFLOW ENTRY POINT CONFIGURATION
# =============================================================================
# Defines the initial state where code generation workflow with file saving begins
# =============================================================================

startstate: CoderEntryPoint