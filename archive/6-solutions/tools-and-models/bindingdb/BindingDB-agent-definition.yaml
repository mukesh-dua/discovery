    **Example 4: SAR analysis with affinity ranking**
    ```python
    import pandas as pd
    from bindingdb_utils import BindingDBUtils

    OUTPUT_DIR = '/output'  # From dataHandlingContext
    utils = BindingDBUtils()

    # Get all binding data
    binding_data = utils.get_binding_data_by_uniprot('P00533', limit=1000)
    df = pd.DataFrame(binding_data)
    
    # Check if data was returned and has the required column
    if df.empty or 'kd' not in df.columns:
        print("Warning: No binding data returned or 'kd' column not available")
        sar_results = {
            'target_uniprot': 'P00533',
            'target_name': 'EGFR',
            'error': 'No data available',
            'total_compounds': 0
        }
    else:
        # Focus on Kd measurements (gold standard for affinity)
        df_kd = df[df['kd'].notna()].copy()
        
        if df_kd.empty:
            print("Warning: No Kd measurements found")
            sar_results = {
                'target_uniprot': 'P00533',
                'target_name': 'EGFR',
                'error': 'No Kd measurements available',
                'total_compounds': 0
            }
        else:
            # Rank by affinity
            df_kd_sorted = df_kd.sort_values('kd')
            
            # SAR summary
            sar_results = {
                'target_uniprot': 'P00533',
                'target_name': 'EGFR',
                'analysis_type': 'SAR_ranking',
                'total_compounds': len(df_kd),
                'affinity_range': {
                    'best_kd_nm': float(df_kd_sorted['kd'].min()),
                    'worst_kd_nm': float(df_kd_sorted['kd'].max()),
                    'median_kd_nm': float(df_kd_sorted['kd'].median()),
                    'log_range': float(df_kd_sorted['kd'].max() / df_kd_sorted['kd'].min())
                },
                'top_10_binders': df_kd_sorted.head(10)[['ligand_name', 'smiles', 'kd', 'ki']].to_dict(orient='records'),
                'all_data': df_kd_sorted[['bindingdb_id', 'ligand_name', 'smiles', 'kd', 'ki', 'ic50']].to_dict(orient='records')
            }
            
            print(f"SAR analysis complete! Ranked {len(df_kd)} compounds by Kd affinity")
    
    utils.save_json(sar_results, f'{OUTPUT_DIR}/final_results.json')
    ```
    
    ## KEY REMINDERS:
    
    1. **SQLite Database Access**: 640 fields, kinetics, experimental conditions, PDB structures, 3M+ entries
    
    2. **Initialize with SQLite**: `utils = BindingDBUtils(sqlite_db_path="/app/bindingdb.db")`
       - Database path defaults to `/app/bindingdb.db` or `BINDINGDB_DATABASE` environment variable
       - Provides comprehensive data with 640 fields per measurement
    
    3. **Available SQLite Methods** :
       - `get_binding_data_by_uniprot_sqlite()` - Full experimental details
       - `get_kinetic_data_sqlite()` - Kinetic parameters (kon, koff)
       - `search_by_compound_sqlite()` - Search by compound name
       - `search_ligands_by_smiles_sqlite()` - Find targets for specific SMILES
       - `get_sqlite_database_stats()` - Database overview
    
    4. **Database Features**:
       -  Kinetic parameters (kon, koff) for mechanism studies
       -  Experimental conditions (pH, temperature)
       -  PDB structure IDs for structure-based design
       -  Complete publication metadata (authors, institutions)
       -  Cross-references (PubChem, ChEBI, ChEMBL, DrugBank, KEGG, ZINC)
       -  Fast queries (3-50ms with proper indexes)
       -  3-field affinity structure (numeric, raw, qualifier) for precise data handling
    
    5. **BindingDB vs ChEMBL**: Use BindingDB for detailed binding constants with experimental details; use ChEMBL for broader bioactivity and drug properties
    
    6. **Automatic type conversion**: All numeric fields (Kd, Ki, IC50, EC50, kon, koff, pH) are already proper types
    
    7. **Safe JSON serialization**: Always use `utils.save_json()` when saving DataFrame data
    
    8. **UniProt-centric**: BindingDB uses UniProt IDs for targets (not ChEMBL IDs)
    
    9. **Final results**: ALWAYS save results to `final_results.json` in the configured output directory
    
