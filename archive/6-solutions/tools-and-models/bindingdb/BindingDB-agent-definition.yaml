    **Example 3: Comparing multiple ligands**
    ```python
    from bindingdb_utils import BindingDBUtils

    OUTPUT_DIR = '/output'  # From dataHandlingContext
    utils = BindingDBUtils()

    # Define ligands to compare
    ligands = [
        'CCO',  # Ethanol
        'CC(=O)O',  # Acetic acid
        'c1ccccc1'  # Benzene
    ]
    
    # Compare against P00176 (Urokinase)
    comparison = utils.compare_binding_affinity('P00176', ligands, cutoff=1000)
    
    results = {
        'target': 'P00176',
        'requested_ligands': comparison['summary']['requested_ligands'],
        'found_ligands': comparison['summary']['found_ligands'],
        'best_affinity_nm': comparison['summary']['best_affinity_nm'],
        'fold_range': comparison['summary'].get('fold_range', 'N/A'),
        'comparisons': comparison['comparisons']
    }
    
    utils.save_json(results, f'{OUTPUT_DIR}/final_results.json')
    print(f"* Compared {results['found_ligands']} ligands")
