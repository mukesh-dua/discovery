    # MolToolkit API Documentation of prebuilt functions under the `/app` directory

    A comprehensive Python SDK for molecular analysis, structure optimization, and chemical property calculations using RDKit and Open Babel.

    ## Table of Contents

    - [Core Modules](#core-modules)
    - [API Reference](#api-reference)
    - [Molecular Utilities](#molecular-utilities)
    - [Conformer Generation](#conformer-generation)
    - [Functional Group Analysis](#functional-group-analysis)
    - [Hazardous Group Detection](#hazardous-group-detection)
    - [Usage Examples](#usage-examples)
    - [Error Handling](#error-handling)
    - [Best Practices](#best-practices)

    ## Core Modules

    ### 1. `molecular_utils.py`
    Core molecular analysis and descriptor calculations

    ### 2. `get_low_energy_conformer.py`
    3D conformer generation and energy optimization

    ### 3. `mol_functional_groups.py`
    Functional group identification and classification

    ### 4. `mol_hazardous_groups.py`
    Safety and hazard assessment for molecular structures

    ---

    ## API Reference

    ### Molecular Utilities (`from molecular_utils import ...`)

    #### Core Functions
    - `prepare_molecule(smiles, add_hs=True, embed=False)` -> RDKit Mol: Prepare molecule with optional H addition and 3D embedding (ETKDGv3). Raises ValueError (bad SMILES) or RuntimeError (embedding failure).
    - `standardize_molecule(smiles)` -> str: Standardized canonical SMILES (neutralized).
    - `validate_smiles(smiles)` -> tuple(bool, str): Returns **(is_valid, error_message)**. MUST unpack: `is_valid, error = validate_smiles(s)`.
    - `extract_scaffold(smiles)` -> str: Murcko scaffold SMILES.

    #### Property Calculations (all take `smiles: str`)
    - `calculate_molecular_weight(smiles)` -> float: Molecular weight in g/mol.
    - `calculate_molecular_formula(smiles)` -> str: e.g. "C2H6O".
    - `calculate_exact_mass(smiles)` -> float: Exact isotopic mass in Da.
    - `calculate_logp(smiles)` -> float: Crippen LogP.
    - `calculate_tpsa(smiles)` -> float: TPSA in angstrom squared.
    - `calculate_hbond_donors(smiles)` -> int: H-bond donor count.
    - `calculate_hbond_acceptors(smiles)` -> int: H-bond acceptor count.
    - `count_aromatic_rings(smiles)` -> int: Aromatic ring count.
    - `calculate_rotatable_bonds(smiles)` -> int: Rotatable bond count.
    - `count_atoms(smiles)` -> tuple(int, int): Returns **(heavy_atoms, heteroatoms)**. MUST unpack: `heavy, hetero = count_atoms(s)`. Do NOT compare tuple to int.
    - `check_lipinski(smiles)` -> dict: `{compliant: bool, violations: list[str]}`.
    - `identify_stereocenters(smiles)` -> list: (atom_index, R/S config) tuples.

    #### Drug-Likeness
    - `calculate_drug_likeness(smiles, method="QED")` -> dict: Methods: "QED" ({score: float, 0-1}), "Lipinski"/"Ghose"/"Veber"/"Egan" ({compliant: bool, violations: list[str], num_violations: int}), "ALL" (nested dict with all methods).

    #### Structure Enumeration
    - `enumerate_stereoisomers(smiles, max_isomers=10)` -> list[str]: Stereoisomer SMILES.
    - `generate_tautomers(smiles, max_tautomers=10)` -> list[str]: Tautomer SMILES.
    - `search_substructure(smiles, substructure_pattern)` -> bool: SMARTS substructure match.

    #### Charge & Geometry
    - `calculate_partial_charges(smiles, method="Gasteiger", iterations=10, output_format="detailed")` -> dict|list: Atomic partial charges.
    - `optimize_structure(smiles, max_iterations=200, convergence_threshold=1e-4, force_field="MMFF94")` -> dict: {energy: float, status: str, force_field: str, sdf_block: str}. force_field: "MMFF94" or "UFF".

    #### Conformer Generation (from molecular_utils)
    - `generate_conformers(smiles, max_conformers=10)` -> list[str]: **XYZ format strings** for saving to .xyz files.

    ---

    ### Conformer Generation (`from get_low_energy_conformer import ...`)

    - `get_low_energy_conformer(smiles)` -> tuple(mol, xyz_string): Extensive search (10k conformers, 1k opt iterations), returns lowest-energy conformer.
    - `generate_multiple_conformers(mol, maxIters=1, numConfs=1000, UFF_status=False)` -> list[tuple]: Returns (idx, mol_with_conformer, convergence_status, energy). mol must be without Hs. For AddConformer(), prefer `get_conformers_from_mol()`.
    - `get_conformers_from_mol(mol, maxIters=1, numConfs=10, UFF_status=False)` -> list[Conformer]: RDKit Conformer objects for `mol.AddConformer(conf, assignId=True)`. mol without Hs (hydrogenated internally).
    - `validate_atom_distances(mol)` -> bool: Check geometry validity.
    - `mol_to_xyz_string(mol)` -> str: Convert mol with 3D coords to XYZ format.

    **CRITICAL - Do NOT mix conformer return types:**
    - `generate_conformers()` (molecular_utils) returns **XYZ strings** -> for file output
    - `get_conformers_from_mol()` (get_low_energy_conformer) returns **Conformer objects** -> for AddConformer()

    ### I/O Utilities (`from io_utils import ...`)
    - `read_smiles_from_file(file_path)` -> list[str]: Read SMILES from .smi, .txt, .csv.
    - `find_smiles_files(directory)` -> list[str]: Find SMILES files (.smi, .csv, .txt, .dat) in directory.
    #### Complete Example: Conformer Generation with CIF Output
    **Example: Generate multiple conformers and stereoisomers, export as CIF files using ASE**
    ```python
    import sys
    sys.path.append('/app')

    from molecular_utils import enumerate_stereoisomers, prepare_molecule
    from get_low_energy_conformer import get_conformers_from_mol
    from io_utils import find_smiles_files, read_smiles_from_file
    from rdkit import Chem
    from ase import Atoms
    from ase.io import write
    import json
    import os

    OUTPUT_DIR = '/output'  # From dataHandlingContext
    INPUT_DIR = '/input'  # From dataHandlingContext

    # Function to convert RDKit molecule to ASE Atoms object
    def rdkit_mol_to_ase_atoms(mol, conf_id=0):
        """Convert RDKit molecule conformer to ASE Atoms object.

        CRITICAL: Must specify conf_id to get the correct conformer from the molecule.
        """
        conf = mol.GetConformer(conf_id)
        symbols = []
        positions = []

        for atom in mol.GetAtoms():
            pos = conf.GetAtomPosition(atom.GetIdx())
            symbols.append(atom.GetSymbol())
            positions.append([pos.x, pos.y, pos.z])

        return Atoms(symbols=symbols, positions=positions)

    # Find all SMILES files in the input directory
    input_files = find_smiles_files(INPUT_DIR)

    if not input_files:
        print(f"No SMILES files found in {INPUT_DIR}")
        final_results = {"status": "no_input_files", "message": "No SMILES files found"}
    else:
        all_results = []

        for file_path in input_files:
            print(f"Processing file: {file_path}")
            smiles_list = read_smiles_from_file(file_path)

            for smiles in smiles_list:
                # CRITICAL: Import enumerate_stereoisomers from molecular_utils
                stereoisomers = enumerate_stereoisomers(smiles, max_isomers=5)

                for isomer_idx, isomer_smiles in enumerate(stereoisomers):
                    # Prepare molecule (already has one conformer after embedding)
                    mol = prepare_molecule(isomer_smiles, embed=True)

                    # Generate additional conformers using the correct function
                    conformers = get_conformers_from_mol(mol, numConfs=5, maxIters=200)

                    # IMPORTANT: Add conformers to the molecule first
                    for conf in conformers:
                        mol.AddConformer(conf, assignId=True)

                    # Now mol has multiple conformers (initial + 5 added = 6 total)
                    # Export each conformer as a separate CIF file
                    for conf_idx in range(mol.GetNumConformers()):
                        # Generate CIF file for each conformer using conf_id
                        cif_filename = f'{OUTPUT_DIR}/{os.path.basename(file_path)}_isomer{isomer_idx}_conf{conf_idx}.cif'
                        # CRITICAL: Pass conf_id to get the specific conformer from the molecule
                        ase_atoms = rdkit_mol_to_ase_atoms(mol, conf_id=conf_idx)
                        write(cif_filename, ase_atoms, format='cif')

                        all_results.append({
                            'original_smiles': smiles,
                            'stereoisomer_smiles': isomer_smiles,
                            'stereoisomer_index': isomer_idx,
                            'conformer_index': conf_idx,
                            'cif_file': cif_filename
                        })

        # Save results to final_results.json
        final_results = {
            'status': 'completed',
            'total_conformers_generated': len(all_results),
            'output_files': [result['cif_file'] for result in all_results],
            'file_descriptions': {
                'cif_files': 'CIF files for each conformer of generated stereoisomers'
            }
        }

    with open(f'{OUTPUT_DIR}/final_results.json', 'w') as f:
        json.dump(final_results, f, indent=2)
    ```

