    ### Functional Group Analysis

    ##### `identify_functional_groups(smiles, sort_by_priority=True)`
    Identify all functional groups in a molecule.

    **Params:**
    - `smiles` (str): SMILES string
    - `sort_by_priority` (bool): Sort results by functional group priority
    **Returns:**
    - `list`: Names of functional groups found
    **Example:**
    ```python
    from mol_functional_groups import identify_functional_groups

    groups = identify_functional_groups("CC(=O)O")
    # Returns: ["Carboxylic Acid", "Ketone", "Alkane (Alkyl)"]
    ```

    ##### `get_functional_groups_by_category()`
    Get functional groups organized by chemical category.

    **Returns:**
    - `dict`: Categories as keys, functional group lists as values
    **Categories Include:**
    - Carboxylic derivatives & carbonyls
    - Oxygen-containing
    - Nitrogen-containing  
    - Sulfur-containing
    - Phosphorus-containing
    - Boron-containing
    - Silicon-containing
    - Selenium-containing
    - Hydrocarbon
    - Halogen-containing

    ##### `get_smarts_patterns()`
    Get SMARTS patterns for all functional groups.

    **Returns:**
    - `dict`: Functional group names as keys, SMARTS patterns as values
    **Example Usage:**
    ```python
    # Get all categories
    categories = get_functional_groups_by_category()
    print(categories.keys())

    # Get SMARTS patterns
    patterns = get_smarts_patterns()
    print(patterns["Carboxylic Acid"])  # [CX3](=O)[OX2H]
    ```

