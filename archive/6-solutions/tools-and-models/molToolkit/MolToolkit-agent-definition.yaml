    ### Hazardous Group Detection

    ##### `identify_hazardous_groups(smiles)`
    Screen molecules for safety-related functional groups and structural alerts.

    **Params:**
    - `smiles` (str): SMILES string
    **Returns:**
    - `list`: List of matched hazardous group identifiers
    **Example:**
    ```python
    from mol_hazardous_groups import identify_hazardous_groups

    alerts = identify_hazardous_groups("CC(=O)OONO2")
    # Returns groups like: ["explosive_groups.nitrate_1"]
    ```

