    ## Format Conversion Functions

    ### CIF Conversions (requires Open Babel)

    ##### `cif_to_mol2(cif_path)`, `cif_to_pdb(cif_path)`, `cif_to_smiles(cif_path)`, `cif_to_xyz(cif_path)`
    Convert Crystallographic Information File format to other molecular formats.

    ### MOL2 Conversions
    ##### `mol2_to_pdb(mol2_path)`, `mol2_to_sdf(mol2_path)`, `mol2_to_smiles(mol2_path)`, `mol2_to_xyz(mol2_path)`

    Convert Tripos MOL2 format to other formats.

    ### SMILES Conversions

    ##### `smiles_to_mol2(smiles)`, `smiles_to_pdb(smiles)`, `smiles_to_sdf(smiles)`, `smiles_to_xyz(smiles, optimize=False)`

    Convert SMILES to various 3D molecular formats.

    ### SDF Conversions
    ##### `sdf_to_mol2(sdf_path)`, `sdf_to_pdb(sdf_path)`, `sdf_to_smiles(sdf_path)`, `sdf_to_xyz(sdf_path)`

    ---

    ## Error Handling & Best Practices
    - Common exceptions: `ValueError` (bad SMILES/params), `RuntimeError` (computation failure), `TypeError` (wrong types)
    - Always validate SMILES early with `validate_smiles()` before expensive computations
    - Use batch processing for multiple molecules; choose appropriate conformer counts based on molecular complexity
    - Screen for hazardous groups in drug discovery workflows

