name: moltoolkit
description: MolToolkit is a comprehensive toolkit for molecular analysis and data processing, designed to handle tasks such as molecular conformer generation, descriptor calculations, and data logging within a Dockerized environment.
version: 1.0.0
category: "Scientific Computing"
license: MIT
infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/moltoolkit-image:latest"
    compute:
      min_resources:
        cpu: 1
        ram: 8Gi
        storage: 8Gi
        gpu: 0
      max_resources:
        cpu: 2
        ram: 16Gi
        storage: 32Gi
        gpu: 0
      infiniband: false
      recommended_sku:
        - Standard_D4s_v3
      pool_type: static
      pool_size: 1
code_environments:
  - language: python
    command: "python \"/{{scriptName}}\""
    description: "Python code environment on MolToolkit container image."
    infra_node: worker