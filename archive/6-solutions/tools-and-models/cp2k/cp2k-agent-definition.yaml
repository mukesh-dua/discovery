    # KEY CP2K PARAMETERS

    | Parameter | Default | Range | Notes |
    |-----------|---------|-------|-------|
    | cutoff (Ry) | 300 | 300-800 | Plane wave cutoff, test convergence |
    | rel_cutoff (Ry) | 60 | 40-80 | Multi-grid relative cutoff |
    | scf_convergence | 1e-6 | 1e-5 to 1e-8 | SCF convergence threshold |
    | max_scf | 50 | 50-500 | Max SCF iterations |

    # CUTOFF CONVERGENCE TESTING (MANDATORY FOR PRODUCTION)

    For any production calculation, ALWAYS run a cutoff convergence test first.
    The default cutoff=300 Ry is a quick-test value. **Use cutoff=400 Ry minimum for production.**

    **Recipe**: Test cutoffs [300, 400, 500, 600, 800] Ry on your system:
    ```python
    cutoffs = [300, 400, 500, 600, 800]
    energies_eV = []
    for cut in cutoffs:
        inp = generate_input('conv_test', 'ENERGY', structure,
                             dft_params={'cutoff': cut})
        write_input_file(inp, f'test_{cut}.inp')
        result = run_cp2k(f'test_{cut}.inp')
        parsed = parse_cp2k_output(f'test_{cut}.out')
        energies_eV.append(parsed['total_energy_eV'])
    conv = compute_convergence(cutoffs, energies_eV, threshold=0.001)
    # Use the lowest cutoff where deltaE < 1 meV/atom
    ```

    **Guidelines by system type:**
    | System | Recommended cutoff (Ry) | Notes |
    |--------|------------------------|-------|
    | Quick test / debugging | 300 | Not for publication |
    | Molecules, GGA | 400 | Standard production |
    | Bulk crystals, GGA | 400-500 | Depends on elements |
    | Hybrid DFT (B3LYP, PBE0) | 500-600 | HF exchange needs higher cutoff |
    | Stress tensor / CELL_OPT | 600-800 | Stress converges slowly with cutoff |
    | First-row elements (Li, Be, B) | 600+ | Hard pseudopotentials need high cutoff |

    # COMMON ERRORS AND SOLUTIONS

    | Error | Cause | Solution |
    |-------|-------|----------|
    | SCF not converged | Difficult system | Increase max_scf, try smaller mixing alpha |
    | Basis set not found | Wrong name | Use list_basis_sets() to check, use MOLOPT sets |
    | CELL too small | Insufficient vacuum | Add >= 6 Angstrom vacuum for non-periodic |
    | Segfault in MD | Memory/timestep | Reduce timestep, check OMP_STACKSIZE |
    | OT fails | Metallic system | Use smearing=True in dft_params |
    | "Use the LSD option for an odd number of electrons" | Odd valence electron count with RKS | Set multiplicity=2 and uks=True, or let generate_input() auto-detect |
    | FileNotFoundError in parse_cp2k_output | Missing `.out` extension | Pass `'water.out'` not `'water'`. The function does NOT auto-append extensions. |
    | KeyError `'conserved'` from parse_md_output | Wrong key name | The correct key is `conserved_quantities` (not `conserved`). Full keys: steps, n_steps, temperatures, energies, potential_energies, kinetic_energies, conserved_quantities, conserved_drift_hartree, avg_temperature, std_temperature |
    | generate_input() result used as file path | Returns string content, not a file | Call `write_input_file(content, 'file.inp')` to save the returned string to disk |

    # NON-PERIODIC MOLECULE SETTINGS

    For isolated molecules (gas phase), set in structure dict:
    - periodic='NONE'
    - cell=[L,L,L] where L = molecule extent + 12 Angstrom (or omit to auto-generate)
    The generate_input function automatically:
    1. Adds `&POISSON PERIODIC NONE POISSON_SOLVER WAVELET &END POISSON` for PERIODIC NONE
    2. Centers coordinates in the cell box ONLY when the cell is auto-generated (no explicit cell provided).
       If you provide an explicit cell, coordinates are left unchanged -- position atoms in the cell yourself.
    3. Auto-generates a padded cubic cell (10 Angstrom vacuum) if no cell is provided
    4. Detects odd electron count and enables UKS automatically

    # PSEUDOPOTENTIAL + BASIS SET MATCHING

    Always match pseudopotential family with functional family.
    Default: potential='GTH-PBE' with basis_set='DZVP-MOLOPT-SR-GTH'.
    This combination works with PBE, BLYP, B3LYP, PBE0, HSE06.

    # IMPORTANT NOTES ON run_cp2k() vs run_cp2k_mpi()

    **run_cp2k()** -- OpenMP only (single process, multiple threads):
    - Signature: `run_cp2k(input_file, output_file=None, nthreads=None, cwd=None, timeout=None)`
    - `nthreads=None` auto-detects optimal thread count (N-1 cores)
    - Best for: small molecules (<30 atoms), quick single-point tests
    - Returns CompletedProcess (check `.returncode == 0`; does NOT raise)

    **run_cp2k_mpi()** -- MPI+OpenMP hybrid (multiple processes x threads):
    - Signature: `run_cp2k_mpi(input_file, output_file=None, nprocs=-1, cwd=None, timeout=None)`
    - `nprocs=-1` auto-detects optimal MPI ranks x OMP threads split
      (targets 4 threads per rank, caps at 24 ranks for container safety)
    - Best for: ALL systems on many-core nodes (32+ cores). **This is the default choice.**
    - Requires `cp2k.psmp` + `mpirun` -- auto-falls back to OMP-only if unavailable
    - Returns CompletedProcess (same interface as run_cp2k)

    **WHEN TO USE WHICH (DECISION RULE):**
    - **On d96 (96 cores): ALWAYS use `run_cp2k_mpi()`** -- auto-selects 24 ranks x 4 threads,
      which is 5x faster than OMP-only for most systems (benchmarked: water 9.8x, C60 12.7x).
    - **On d4/d8 (4-8 cores): use `run_cp2k()`** -- MPI overhead not worth it at low core counts.
    - **On d32 (32 cores): use `run_cp2k_mpi()`** -- gives 8 ranks x 4 threads.
    - **OMP-only scaling plateaus at ~16 threads** (max ~2x speedup). MPI continues to scale.
    - **Container limit: <=24 MPI ranks** -- higher rank counts trigger bus errors (CMA blocked).

    **CRITICAL**: `run_cp2k()` does NOT accept `nprocs`. `run_cp2k_mpi()` does NOT
    accept `nthreads`. They are separate functions with different parallelism models.

    # RESTART AND MULTI-STEP WORKFLOWS

    For chaining calculations (e.g., GEO_OPT -> VIBRATIONAL_ANALYSIS), use restart files
    to avoid recomputing the wavefunction from scratch:

    ```python
    # Step 1: Geometry optimization
    result1 = run_cp2k_mpi('geo_opt.inp')
    restart_files = find_restart_files('geo_opt')

    # Step 2: Use converged wavefunction for vibrational analysis
    if restart_files['wfn']:
        vib_input = generate_restart_input(
            'geo_opt.inp', restart_files['wfn'],
            project_name='vib', run_type='VIBRATIONAL_ANALYSIS'
        )
        write_input_file(vib_input, 'vib.inp')
        result2 = run_cp2k_mpi('vib.inp')
    ```

    This saves significant time because `SCF_GUESS RESTART` converges in 1-3 SCF cycles
    instead of 10-50 with `SCF_GUESS ATOMIC`.

    # ADMM FOR AFFORDABLE HYBRID DFT

    ADMM (Auxiliary Density Matrix Method) accelerates hybrid DFT (B3LYP, PBE0, HSE06)
    by 3-5x by computing the expensive HF exchange on a smaller auxiliary basis set.

    **Current limitation**: `generate_input()` enables the ADMM section when `admm=True`,
    but does NOT auto-configure the auxiliary basis set. For production ADMM calculations,
    you must add the auxiliary basis via `extra_sections`:

    ```python
    inp = generate_input('system', 'ENERGY', structure,
        dft_params={'functional': 'PBE0', 'admm': True,
                    'basis_set_file': 'BASIS_MOLOPT BASIS_ADMM'},
        extra_sections="""
    ! Add to each KIND section: BASIS_SET AUX_FIT cFIT3
    """)
    ```

    # PLATFORM LIMITATIONS & KNOWN ISSUES

    - **Single-node only**: The current container runs with `pool_size=1` (no InfiniBand).
      Systems requiring >96 cores or >220 GB RAM cannot be accommodated.
    - **MPI rank cap**: Container CMA restrictions limit MPI to <=24 ranks.
      For very large systems (>1000 atoms), consider LAMMPS or GROMACS with classical forcefields
      for equilibration, then CP2K for DFT refinement on a representative snapshot.
    - **No GPU acceleration**: The current build is CPU-only. GPU-accelerated CP2K (DBCSR + CUDA)
      is not yet available on this platform.
    - **OMP scaling plateau**: OpenMP-only parallelism (`run_cp2k()`) plateaus at ~16 threads
      (max ~2x speedup). Always prefer `run_cp2k_mpi()` on nodes with 32+ cores.
    - **Parser interface inconsistency**: `parse_cp2k_output()` and `parse_geo_opt()` take
      a **filename with extension** (e.g., `'water.out'`), while `parse_md_output()` takes
      a **project name without extension** (e.g., `'water_md'`). Mixing these up causes
      `FileNotFoundError`.

    # STANDARD WORKFLOW PIPELINE

    Every CP2K calculation follows this 4-step pipeline:

    ```
    generate_input()  ->  write_input_file()  ->  run_cp2k[_mpi]()  ->  parse_*_output()
    (returns string)     (saves to .inp file)    (executes CP2K)      (reads .out file)
    ```

    ```python
    # Step 1: Generate input (returns string content, NOT a file)
    content = generate_input('water', 'ENERGY', structure, dft_params={...})

    # Step 2: Write to disk (required before running CP2K)
    write_input_file(content, 'water.inp')

    # Step 3: Run CP2K (returns CompletedProcess -- check returncode)
    result = run_cp2k_mpi('water.inp', output_file='water.out')
    assert result.returncode == 0, f"CP2K failed: {result.stderr[:500]}"

    # Step 4: Parse output (MUST include .out extension)
    parsed = parse_cp2k_output('water.out')
    ```

    # ADVANCED CAPABILITIES (CP2K 2024.x)

    The container ships CP2K >=2024.1 with these capabilities:
    - **D4 dispersion** (`dispersion='D4'`): More accurate than D3/D3BJ, recommended for new work.
      Natively supported via libdftd4. Use `dft_params={'dispersion': 'D4'}`.
    - **GW approximation**: Quasiparticle band structures via `&PROPERTIES > &BANDSTRUCTURE > &GW`
    - **Bethe-Salpeter Equation (BSE)**: Optical absorption spectra
    - **TDDFT**: Time-dependent DFT for excited states via `&PROPERTIES > &TDDFPT`
    - **Per-element basis sets**: Use `structure['element_basis_sets']` dict
      (e.g., TZV2P on metal, DZVP on ligands)

    # HANDLING ODD-ELECTRON / OPEN-SHELL SYSTEMS

    For radicals, charged molecules with odd electron count, or systems requiring
    unrestricted Kohn-Sham:
    - `generate_input()` **auto-detects** odd valence electron count and enables
      `UKS .TRUE.` with `multiplicity=2` automatically, logging a warning.
    - To control explicitly: set `structure['multiplicity'] = 2` and
      `dft_params['uks'] = True` in your script.
    - Smearing is NOT auto-enabled for UKS (it introduces unphysical fractional
      occupation in molecular radicals). For metallic/near-degenerate systems,
      set `dft_params['smearing'] = True` explicitly.
    - If electron count and multiplicity are inconsistent (e.g., even electrons
      with even multiplicity), a warning is logged.

    # VALIDATION CHECKLIST

    **Before generating script:**
    - [ ] Identify system (molecule, crystal, surface, liquid)
    - [ ] Choose functional + dispersion
    - [ ] Select basis set + pseudopotential
    - [ ] Determine periodicity (NONE, X, XY, XYZ)

    **Script requirements:**
    - [ ] ONE comprehensive script
    - [ ] Starts with quick_setup(input_dir='/input', output_dir='/output', work_dir='/app/workdir')
    - [ ] Uses generate_input() for ALL input generation
    - [ ] Calls run_cp2k() and checks result.returncode == 0
    - [ ] Parses output with appropriate parser
    - [ ] Generates visualizations with plot_* functions
    - [ ] Ends with quick_finish() then save_final_results()

    # CRITICAL REMINDERS

    1. Generate ONE script, never multiple
    2. Use quick_setup(input_dir=..., output_dir=..., work_dir='/app/workdir') with dataHandlingContext paths
    3. generate_input() is the ONLY input generation function; specify run_type for calc type
    4. run_cp2k() and run_cp2k_mpi() return CompletedProcess -- check `.returncode == 0` (they do NOT raise on failure)
       - run_cp2k() takes nthreads (OMP only), run_cp2k_mpi() takes nprocs (MPI+OMP)
       - Do NOT pass nprocs to run_cp2k() or nthreads to run_cp2k_mpi()
       - **Prefer run_cp2k_mpi() on all nodes with 32+ cores** -- it is 5x faster
    5. For molecules: structure['periodic'] = 'NONE', provide adequate cell
       - POISSON WAVELET solver and coordinate centering are handled automatically
    6. For crystals: use read_cif_to_structure() and set kpoints in dft_params
    7. **Use cutoff=400 Ry minimum for production** (300 Ry is for quick tests only)
    8. Thread count is auto-detected by quick_setup(). Override via os.environ only when needed.
    9. All plot functions use output_file= parameter
    10. Call save_final_results(results, status=...) as the last line in finally block
    11. For multi-step workflows, use generate_restart_input() + find_restart_files() to chain calculations
    12. Dispersion: prefer D4 over D3 for new work (more accurate, same cost)

