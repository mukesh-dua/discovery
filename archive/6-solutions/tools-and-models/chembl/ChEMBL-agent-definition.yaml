    - **ChEMBLUtils class for custom workflows**:
      ```python
      from chembl_utils import ChEMBLUtils
      import json
      import os

      OUTPUT_DIR = '/output'  # From dataHandlingContext

      # Ensure output directory exists
      os.makedirs(OUTPUT_DIR, exist_ok=True)

      utils = ChEMBLUtils()

      try:
          # Search for compounds (note: returns tuple)
          compounds, total = utils.search_compounds(query="aspirin", limit=10)

          # Get bioactivity data
          if compounds:
              chembl_id = compounds[0]['chembl_id']
              activities, act_total = utils.get_bioactivities_for_compound(molecule_chembl_id=chembl_id, limit=50)

              final_results = {
                  "compound": compounds[0],
                  "bioactivities": activities,
                  "total_activities": len(activities)
              }

              with open(f"{OUTPUT_DIR}/final_results.json", "w") as f:
                  json.dump(final_results, f, indent=2)

              print(f"Found {len(activities)} bioactivities for {compounds[0]['pref_name']}")

      except Exception as e:
          error_report = {"error": str(e), "status": "failed"}
          with open(f"{OUTPUT_DIR}/error_log.json", "w") as f:
              json.dump(error_report, f, indent=2)
          print(f"Error occurred: {e}")
      ```

    - **Direct API usage for custom queries**:
      ```python
      import requests
      import json
      import os

      OUTPUT_DIR = '/output'  # From dataHandlingContext

      # Ensure output directory exists
      os.makedirs(OUTPUT_DIR, exist_ok=True)

      base_url = "https://www.ebi.ac.uk/chembl/api/data"

      # Search for molecules
      response = requests.get(f"{base_url}/molecule/search/imatinib.json", params={'limit': 10})
      data = response.json()

      molecules = data.get('molecules', [])

      final_results = {
          "search_query": "imatinib",
          "total_results": len(molecules),
          "molecules": molecules
      }

      with open(f"{OUTPUT_DIR}/final_results.json", "w") as f:
          json.dump(final_results, f, indent=2)

