    ### Common Pitfalls to Avoid:
    
    1. **Looping with individual fetches**: Always use batch methods (`get_compounds_by_chembl_ids`) instead of loops
    2. **Empty DataFrames**: Check `if ligand_details:` before creating DataFrame and merging
    3. **Merge on wrong fields**: Bioactivity uses `molecule_chembl_id`, compound details use `chembl_id`
    4. **Type conversion - NO LONGER NEEDED!**:  The utility functions now **automatically convert numeric fields to proper types** (float/int). You can use DataFrame operations directly:
       ```python
       # Create DataFrame - numeric fields are ALREADY proper types
       df_ligands = pd.DataFrame(ligand_details)
       
       # NO conversion needed! You can use operations directly:
       mean_mw = df_ligands['molecular_weight'].mean()  # * Works directly
       alogp_range = (df_ligands['alogp'].min(), df_ligands['alogp'].max())  # * Works directly
       filtered = df_ligands[df_ligands['molecular_weight'] > 500]  # * Works directly
       
       # DataFrame dtypes are automatically correct:
       # molecular_weight: float64, alogp: float64, hba: int64, etc.
       ```
       
       **Note**: If you're using an older version of chembl_utils.py (before automatic conversion was added), you may still need manual conversion with `pd.to_numeric()`. Check if operations fail, and if so, update your chembl_utils.py file.
       
    5. **Missing pchembl_value**: Not all bioactivities have this field, filter first:
       ```python
       df_filtered = df_merged[df_merged['pchembl_value'].notna()]
       ```
    6. **Null/missing data**: Some compounds may have `null` for `molecule_properties`, `molecule_structures`, or other nested fields. The utility function handles this defensively by returning empty dicts/lists, so compound properties (smiles, alogp, molecular_weight, etc.) may be `None`. Always check for `None` when filtering or doing calculations:
       ```python
       # Check before filtering
       if compound.get('smiles'):  # Only process if SMILES exists
       ```
    7. **max_phase format**: The `max_phase` field can be `'4.0'`, `'4'`, `'3.0'`, etc. Use `.startswith('4')` instead of `== '4'` to handle both formats:
       ```python
       # INCORRECT: if compound.get('max_phase') == '4':
       # CORRECT:
       max_phase = compound.get('max_phase')
       if max_phase and max_phase.startswith('4'):
       ```
    8. **Saving DataFrame data to JSON - CRITICAL**: When converting pandas DataFrames to dictionaries for JSON export, NaN values will cause invalid JSON. **ALWAYS use the utility's safe serialization**:
       ```python
       # INCORRECT - produces invalid JSON with NaN:
       json.dump(df.to_dict(orient='records'), f, indent=2)
       
       # CORRECT - use utility's safe_json_serialize:
       from chembl_utils import ChEMBLUtils
       safe_data = ChEMBLUtils.safe_json_serialize(df.to_dict(orient='records'))
       json.dump(safe_data, f, indent=2)
       
       # EVEN BETTER - use utility's save_json method:
       utils.save_json(df.to_dict(orient='records'), f'{OUTPUT_DIR}/results.json')
       ```
    9. **Using DataFrame.apply() with None values - CRITICAL**: When applying string methods (like `.startswith()`) to DataFrame columns, **ALWAYS handle None values**:
       ```python
       # INCORRECT - AttributeError if max_phase is None:
       df['is_approved'] = df['max_phase'].apply(lambda x: x.startswith('4'))
       
       # CORRECT - check for None first:
       df['is_approved'] = df['max_phase'].apply(lambda x: x and x.startswith('4') if x else False)
       
       # OR filter out None values first:
       df['is_approved'] = df['max_phase'].apply(lambda x: x.startswith('4') if x is not None else False)
       
       # BEST - use pandas string accessor (handles None automatically):
       df['is_approved'] = df['max_phase'].str.startswith('4', na=False)
       ```
       **Note**: Many compounds have `max_phase = None` (not in clinical development), so this is very common!
    
