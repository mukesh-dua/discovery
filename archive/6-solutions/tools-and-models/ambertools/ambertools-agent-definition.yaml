    # COMMON MD INPUT PARAMETERS

    | Phase | imin | nstlim | dt | ntb | ntp | ntt | Typical nsteps |
    |-------|------|--------|-----|-----|-----|-----|----------------|
    | Minimization | 1 | - | - | 1 | 0 | 0 | maxcyc=5000 |
    | Heating (NVT) | 0 | 25000 | 0.002 | 1 | 0 | 3 | 50 ps |
    | Equilibration (NPT) | 0 | 50000 | 0.002 | 2 | 1 | 3 | 100 ps |
    | Production (NPT) | 0 | 500000+ | 0.002 | 2 | 1 | 3 | 1+ ns |

    Key settings: ntc=2 (SHAKE on H), ntf=2 (omit H bond forces), cut=10.0 (nonbonded cutoff)

    # EXAMPLE 1: Protein Preparation and Minimization

    ```python
    from ambertools_utils import (
        quick_setup, quick_finish, save_final_results,
        prepare_system, write_minimization_input, run_sander,
        parse_mdout, analyze_energy, plot_energy, get_system_info,
    )
    import logging

    quick_setup(input_dir='/input', output_dir='/output')
    results = {}
    output_files = {}
    file_descriptions = {}

    try:
        logging.info("******* STEP 1: PREPARE SYSTEM *******")
        sys_info = prepare_system('protein.pdb', force_field='ff14SB', water_model='TIP3P',
                                  box_buffer=10.0, output_prefix='system')
        prmtop = sys_info['prmtop']
        inpcrd = sys_info['inpcrd']
        info = get_system_info(prmtop)
        results['system'] = {'n_atoms': info['n_atoms'], 'n_residues': info['n_residues'],
                             'n_waters': info['n_waters']}

        logging.info("******* STEP 2: MINIMIZE *******")
        mdin = write_minimization_input(max_cycles=5000, steepest_descent=2500)
        with open('min.in', 'w') as f:
            f.write(mdin)
        mdout = run_sander('min.in', prmtop, inpcrd, output_prefix='min')

        logging.info("******* STEP 3: ANALYZE *******")
        energy = analyze_energy(mdout)
        results['minimization'] = energy
        mdout_data = parse_mdout(mdout)
        plot_path = plot_energy(mdout_data, 'min_energy.png', properties=['etot'])
        output_files['energy_plot'] = plot_path
        file_descriptions['energy_plot'] = 'Minimization energy convergence'
    except Exception as e:
        logging.error(f"Error: {e}")
        results['error'] = str(e)
    finally:
        save_final_results(results, output_files, file_descriptions)
        quick_finish()
    ```

    # EXAMPLE 2: Full MD Simulation with Analysis

    ```python
    from ambertools_utils import (
        quick_setup, quick_finish, save_final_results,
        prepare_system, write_minimization_input, write_heating_input,
        write_equilibration_input, write_production_input,
        run_sander, compute_rmsd, compute_rmsf, compute_hbonds,
        plot_rmsd, plot_rmsf, plot_hbonds, analyze_energy,
    )
    import logging

    quick_setup(input_dir='/input', output_dir='/output')
    results = {}
    output_files = {}
    file_descriptions = {}

    try:
        logging.info("******* STEP 1: PREPARE *******")
        sys_info = prepare_system('protein.pdb', output_prefix='sys')
        prmtop, inpcrd = sys_info['prmtop'], sys_info['inpcrd']

        logging.info("******* STEP 2: MINIMIZE *******")
        with open('min.in', 'w') as f:
            f.write(write_minimization_input(max_cycles=2000))
        run_sander('min.in', prmtop, inpcrd, output_prefix='min')

        logging.info("******* STEP 3: HEAT *******")
        with open('heat.in', 'w') as f:
            f.write(write_heating_input(target_temp=300.0, nsteps=10000))
        run_sander('heat.in', prmtop, 'min.rst7', output_prefix='heat', ref_coords='min.rst7')

        logging.info("******* STEP 4: EQUILIBRATE *******")
        with open('equil.in', 'w') as f:
            f.write(write_equilibration_input(nsteps=10000))
        run_sander('equil.in', prmtop, 'heat.rst7', output_prefix='equil', ref_coords='heat.rst7')

        logging.info("******* STEP 5: PRODUCTION *******")
        with open('prod.in', 'w') as f:
            f.write(write_production_input(nsteps=50000, ntwx=500))
        run_sander('prod.in', prmtop, 'equil.rst7', output_prefix='prod')

        logging.info("******* STEP 6: ANALYSIS *******")
        rmsd = compute_rmsd(prmtop, 'prod.nc')
        rmsf = compute_rmsf(prmtop, 'prod.nc')
        hbonds = compute_hbonds(prmtop, 'prod.nc')
        results['rmsd_mean'] = float(rmsd.get('rmsd', [0]).mean()) if 'rmsd' in rmsd else 0
        results['n_hbonds'] = hbonds.get('n_hbonds', 0)

        plot_rmsd(rmsd, 'rmsd.png')
        plot_rmsf(rmsf, 'rmsf.png')
        output_files['rmsd'] = 'rmsd.png'
        output_files['rmsf'] = 'rmsf.png'
    except Exception as e:
        logging.error(f"Error: {e}")
        results['error'] = str(e)
    finally:
        save_final_results(results, output_files, file_descriptions)
        quick_finish()
    ```

    # EXAMPLE 3: Small Molecule Parameterization

    ```python
    from ambertools_utils import (
        quick_setup, quick_finish, save_final_results,
        parameterize_ligand, get_system_info,
    )
    import logging

    quick_setup(input_dir='/input', output_dir='/output')
    results = {}
    output_files = {}

    try:
        logging.info("******* PARAMETERIZE LIGAND *******")
        lig = parameterize_ligand('molecule.sdf', charge_method='bcc',
                                  atom_type='gaff2', net_charge=0)
        results['ligand'] = {k: v for k, v in lig.items() if isinstance(v, str)}
        info = get_system_info(lig['prmtop'])
        results['n_atoms'] = info['n_atoms']
        output_files['mol2'] = lig['mol2']
        output_files['frcmod'] = lig['frcmod']
    except Exception as e:
        logging.error(f"Error: {e}")
        results['error'] = str(e)
    finally:
        save_final_results(results, output_files)
        quick_finish()
    ```

    # KNOWN PITFALLS

    | Issue | Cause | Solution |
    |-------|-------|----------|
    | NMR PDB multi-model crash | pdb4amber --reduce fails on multi-model NMR PDBs | Extract first MODEL block before processing |
    | ACE/NME capping atoms | Non-standard atom names in capping groups | Use pdb4amber to standardize names |
    | Missing ligand parameters | GAFF2 cannot cover all atom types | Check parmchk2 output for ATTN warnings |
    | sander out of memory | System too large for available RAM | Reduce box buffer or use fewer water molecules |
    | SHAKE failure during heating | Too-large timestep or bad initial geometry | Minimize thoroughly first, reduce dt to 0.001 |

    # READING UPSTREAM JOB RESULTS (MULTI-AGENT WORKFLOWS)

    When reading `final_results.json` from a previous agent's output:
    - The JSON structure is: `{"status": "...", "summary": <actual_results>, "output_files": {...}}`
    - Access the actual results via `data['summary']`, NOT directly from the top-level keys
    - Check `data['status']` to verify the upstream job completed successfully
    - Example: `upstream = json.load(open('/input/final_results.json')); results = upstream['summary']`

    NOTE on file copying: `quick_setup()` copies only common AMBER file formats (.pdb, .mol2, .sdf,
    .prmtop, .pdbqt, .json, etc.) to the working directory. If your workflow depends on files with
    non-standard extensions from upstream agents, call `copy_all_input_files()` after setup, or use
    `copy_input_files(patterns=['*'])` to copy everything.

    # VALIDATION CHECKLIST

    Before submitting your script, verify:
    - [ ] Script imports from `ambertools_utils` including `save_final_results`
    - [ ] Starts with `quick_setup(input_dir='/input', output_dir='/output')`
    - [ ] Calls `save_final_results()` in finally block
    - [ ] Ends with `quick_finish()` in finally block
    - [ ] Uses library functions for system prep and analysis
    - [ ] MD workflow follows: minimize -> heat (NVT) -> equilibrate (NPT) -> production (NPT)
    - [ ] Correct force field selected for system type
    - [ ] Restraints applied during heating/equilibration, removed for production

