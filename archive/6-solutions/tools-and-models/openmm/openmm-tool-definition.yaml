name: openmm
description: >
  Python code environment with OpenMM for GPU-accelerated molecular dynamics simulations.
  Includes MDTraj for trajectory analysis, PDBFixer for structure preparation,
  ParmEd for topology manipulation, and OpenMMForceFields for extended force field support.
  Supports AMBER, CHARMM, and OPLS force fields with implicit and explicit solvation.
version: 1.0.0
category: "Physics-Based Simulations"
license: MIT

infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/openmm:latest"
    compute:
      min_resources:
        cpu: 2
        ram: "8Gi"
        gpu: 0
        storage: "0Gi"
      max_resources:
        cpu: 96
        ram: "220Gi"
        gpu: 1
        storage: "0Gi"
      infiniband: false
      recommended_sku:
        - Standard_NC40ads_H100_v5
        - Standard_D4s_v6
        - Standard_D8s_v6
        - Standard_D16s_v6
      pool_type: static
      pool_size: 1

code_environments:
  - language: python3
    command: "python3 -u \"/{{scriptName}}\" > {{output_directory}}/logs.out 2>&1; cp -r /workdir/* {{output_directory}}/ 2>/dev/null || true; tail -n 100 {{output_directory}}/logs.out"
    description: |
      Python code environment with OpenMM for molecular dynamics simulations.
      Includes openmm, mdtraj, parmed, pdbfixer, openmmforcefields, openmmtools.
      Supports GPU (CUDA/OpenCL) and CPU platforms with automatic selection.
      Key capabilities: PDB preparation, system building, minimization,
      NVT/NPT equilibration, production MD, trajectory analysis, visualization.
    infra_node: worker
