name: lammps-cpu
description: LAMMPS is a molecular simulation tool.
version: 1.0.0
category: "Physics-Based Simulations"
license: MIT
infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/lammps-cpu:latest"
    compute:
      min_resources:
        cpu: 2
        ram: "4Gi"
        gpu: 0
        storage: "0Gi"
      max_resources:
        cpu: 4
        ram: "8Gi"
        storage: "0Gi"
      infiniband: false
      recommended_sku:
        - Standard_D4s_v6
      pool_type: static
      pool_size: 1
code_environments:
  - language: python3
    command: 'python3 "/{{scriptName}}" > /app/outputs/logs.out 2>&1; cp /app/workdir/* /app/outputs/;tail -n 100 /app/outputs/logs.out'
    description: "Python code environment with LAMMPS CPU tool for high-performance molecular dynamics (MD) simulations."
    infra_node: worker
