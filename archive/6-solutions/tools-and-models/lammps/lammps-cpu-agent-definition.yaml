    # Get actual volume from simulation (CRITICAL for correct results)
    # For LJ data.lj: box is ~10.58 x 10.58 x 21.16, volume ~ 2368
    Lx, Ly, Lz = 10.58, 10.58, 21.16  # Get from data file or log
