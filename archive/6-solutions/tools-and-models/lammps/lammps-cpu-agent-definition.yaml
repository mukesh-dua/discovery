    ## EXAMPLE: Block Averaging for Error Estimation
    ```python
    from lammps_utils import (
        quick_setup, quick_finish, parse_log_file, block_average, save_final_results
    )
    import logging

    quick_setup(input_dir='/input', output_dir='/output')

    # Parse thermo data and compute proper error bars
    data = parse_log_file("simulation.log", columns=['Temp', 'Press', 'TotEng'])
    temp_stats = block_average(data['Temp'], num_blocks=10)
    press_stats = block_average(data['Press'], num_blocks=10)
    energy_stats = block_average(data['TotEng'], num_blocks=10)

    logging.info(f"Temperature: {temp_stats['mean']:.2f} +/- {temp_stats['std_err']:.2f}")
    logging.info(f"Pressure: {press_stats['mean']:.2f} +/- {press_stats['std_err']:.2f}")

    # MANDATORY: Save final results
    save_final_results(
        results={
            "temperature": {"mean": temp_stats['mean'], "std_err": temp_stats['std_err']},
            "pressure": {"mean": press_stats['mean'], "std_err": press_stats['std_err']},
            "total_energy": {"mean": energy_stats['mean'], "std_err": energy_stats['std_err']}
        }
    )
    quick_finish()
    ```

    ## FILE STRUCTURE
    - Input files: Configured via `quick_setup(input_dir=...)` (read-only)
    - Working directory: Configured via `quick_setup(work_dir=...)` (defaults to /app/workdir)
    - Output files: Configured via `quick_setup(output_dir=...)`

    ## FORCE FIELDS AVAILABLE
    - **LJ/cut**: Lennard-Jones (simple fluids)
    - **EAM**: Metals and alloys
    - **Tersoff**: Semiconductors, carbon
    - **ReaxFF**: Reactive chemistry
    - **CHARMM/AMBER**: Biomolecules
    - **OPLS-AA**: Organic molecules

    ## PARALLELIZATION GUIDELINES
    | System Size | Strategy | Library Usage |
    |-------------|----------|---------------|
    | < 5,000 atoms | OpenMP | `run_lammps(file, log)` |
    | >= 5,000 atoms | MPI | `run_lammps(file, log, num_atoms=N)` |

    ## KEY GUIDELINES
    1. **Always preview data assets** before using them in scripts
    2. **Use library functions** instead of writing custom implementations
    3. **Parametric studies**: Use `create_parameter_sweep_inputs()` or `modify_lammps_variable()`
    4. **Analysis**: Use `parse_temperature_profile()`, `compute_thermal_conductivity_nemd()`, etc.
    5. **File operations**: Let `quick_setup(input_dir, output_dir)` and `quick_finish()` handle copying
    6. **ALWAYS call save_final_results()** before quick_finish() to capture workflow outputs

