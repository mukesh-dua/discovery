    ## USING MDANALYSIS FOR TRAJECTORY ANALYSIS

    ```python
    import MDAnalysis as mda
    from MDAnalysis.analysis import rdf, msd, align

    # Load trajectory
    u = mda.Universe("data.lammps", "trajectory.lammpstrj", format="LAMMPSDUMP")

    # Compute RDF
    rdf_analysis = rdf.InterRDF(u.atoms, u.atoms, nbins=100, range=(0, 10))
    rdf_analysis.run()

    # Compute MSD
    msd_analysis = msd.EinsteinMSD(u, select="all")
    msd_analysis.run()

    # Atom selections
    water = u.select_atoms("type 1 2")  # By atom type
    region = u.select_atoms("prop z > 10 and prop z < 20")  # By position
    ```

    ## USING ASE FOR STRUCTURE BUILDING

    ```python
    from ase.io import read, write
    from ase.build import bulk, surface, molecule
    from ase.io.lammpsdata import write_lammps_data

    # Read structure from various formats
    atoms = read("structure.cif")
    atoms = read("structure.pdb")

    # Build crystals
    cu = bulk('Cu', 'fcc', a=3.6, cubic=True)
    cu_supercell = cu.repeat([5, 5, 5])

    # Build surfaces
    slab = surface(bulk('Au', 'fcc', a=4.08), (1, 1, 1), layers=5, vacuum=10)

    # Write LAMMPS data file
    write_lammps_data("data.lammps", atoms, atom_style="atomic")
    ```

    ## USING FREUD FOR ANALYSIS

    ```python
    import freud
    import numpy as np

    # Load positions from LAMMPS dump
    box = freud.box.Box(Lx=50, Ly=50, Lz=50)
    positions = np.loadtxt("positions.txt")

    # RDF analysis
    rdf = freud.density.RDF(bins=100, r_max=10)
    rdf.compute(system=(box, positions))

    # Order parameters (for crystalline systems)
    ql = freud.order.Steinhardt(l=6)
    ql.compute(system=(box, positions), neighbors={'r_max': 1.5})

    # Voronoi analysis
    voro = freud.locality.Voronoi()
    voro.compute(system=(box, positions))
    volumes = voro.volumes
    ```

    ## USING PANDAS FOR LOG PARSING

    ```python
    import pandas as pd
    import re

    def parse_lammps_log(logfile):
        """Parse LAMMPS thermo output to DataFrame"""
        data = []
        headers = None
        with open(logfile) as f:
            for line in f:
                if line.startswith("Step"):
                    headers = line.split()
                elif headers and re.match(r'^\s*\d+', line):
                    values = [float(x) for x in line.split()]
                    if len(values) == len(headers):
                        data.append(values)
        return pd.DataFrame(data, columns=headers)

    # Use it
    df = parse_lammps_log("log.lammps")
    df.to_csv("thermo_data.csv")
    print(df[['Step', 'Temp', 'Press', 'TotEng']].describe())
    ```

