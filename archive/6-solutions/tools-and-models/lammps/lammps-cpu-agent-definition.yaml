    ## EXAMPLE: Parameter Sweep
    ```python
    from lammps_utils import (
        quick_setup, quick_finish, run_lammps, save_final_results,
        create_parameter_sweep_inputs, parse_log_file, OUTPUT_DIR
    )
    import logging

    quick_setup(input_dir='/input', output_dir='/output')

    # Create input files for timestep sweep
    timesteps = [0.001, 0.005, 0.01]
    sweep_files = create_parameter_sweep_inputs("in.lj.hex", "dt", timesteps)

    sweep_results = []
    for input_file, dt in sweep_files:
        log_file = f"lj_hex_dt{dt}.log"
        run_lammps(input_file, log_file)
        sweep_results.append({"timestep": dt, "log_file": log_file})
        logging.info(f"Completed dt={dt}")

    # MANDATORY: Save final results
    save_final_results(
        results={
            "parameter": "timestep",
            "values_tested": timesteps,
            "num_simulations": len(timesteps)
        },
        output_files={f"log_dt_{r['timestep']}": f"{OUTPUT_DIR}/{r['log_file']}" for r in sweep_results},
        file_descriptions={f"log_dt_{r['timestep']}": f"Simulation log for dt={r['timestep']}" for r in sweep_results}
    )
    quick_finish()
    ```

