    ## LAMMPS_UTILS LIBRARY REFERENCE

    ### Setup & File Operations
    - `quick_setup(input_dir, output_dir, copy_input=True)` - Initialize logging, create directories, copy input files to work_dir. **input_dir and output_dir are REQUIRED** — get paths from dataHandlingContext.
    - `quick_finish()` - Copy output files to configured output directory
    - `save_final_results(results, output_files, file_descriptions, status)` - **MANDATORY**: Save `final_results.json` to configured output directory. NOTE: results are stored under a `'summary'` key in the JSON.
      - `results`: dict with key metrics (thermal conductivity, diffusion coefficient, etc.)
      - `output_files`: dict mapping names to file paths
      - `file_descriptions`: dict with human-readable descriptions
      - `status`: "completed" or error message
    - `copy_input_files(patterns)` - Copy specific file patterns from configured input directory
    - `copy_outputs(patterns)` - Copy specific output patterns to configured output directory
    - `NUM_CORES` - Number of available CPU cores

    ### Execution
    - `run_lammps(input_file, log_file, num_atoms=None, auto_detect=True)` - Run LAMMPS with optimal parallelization
      - **Auto-detects atom count** from data file (parses `read_data` command)
      - `<5000` atoms: Uses OpenMP (better for small systems)
      - `>=5000` atoms: Uses MPI (better for large systems)
      - Set `auto_detect=False` to disable auto-detection
    - `auto_detect_atom_count(input_file)` - Manually detect atom count from input/data files
    - `run_command(command_list)` - Execute any subprocess command

    ### Parametric Studies
    - `modify_lammps_variable(content, var_name, new_value)` - Modify variable using regex
    - `create_parameter_sweep_inputs(original_file, var_name, values)` - Create sweep input files

    ### Thermal Conductivity Analysis
    - `parse_temperature_profile(filename)` - Parse out.T* files -> array[z, T]
    - `compute_thermal_conductivity_nemd(T_profile, heat_flux, area)` - Compute kappa from NEMD
      Returns: {kappa, kappa_std_err, dT_dz, r_squared, slope_std_err, n_points}
    - `parse_hfacf(filename, use_final_block=True)` - Parse Green-Kubo HFACF output -> array[time, Jx, Jy, Jz]
      - Handles multi-block "ave running" output; by default uses only the final (most converged) block
    - `compute_thermal_conductivity_gk(hfacf_data, volume, temp, timestep)` - Compute kappa from G-K
      Returns: {kappa, kappa_std_err, kappa_x, kappa_y, kappa_z, r_squared, integral, acf_data}
    - `analyze_energy_drift(energy_file)` - Analyze energy conservation

    ### Trajectory & Structural Analysis
    - `parse_dump_file(filename, frame=-1)` - Parse LAMMPS dump files (frame=-1 for last, 'all' for all)
    - `parse_rdf_file(filename)` - Parse RDF output -> {r, g_r, coord}
    - `parse_msd_file(filename)` - Parse MSD output -> {time, msd, msd_components}
    - `parse_density_profile(filename)` - Parse density profiles -> {coord, density, count}
    - `parse_gyration_file(filename)` - Parse radius of gyration -> {time, Rg, Rg_components}

    ### Transport Properties
    - `compute_diffusion_coefficient(msd_data, timestep, dimensions=3)` - Compute D from MSD via Einstein relation

    ### Mechanical Properties
    - `parse_stress_strain(log_file, strain_component, stress_component)` - Extract stress-strain data
    - `compute_elastic_modulus(stress_strain_data, strain_range)` - Compute Young's modulus and yield stress
    - `compute_surface_tension(log_file, box_normal='z')` - Compute gamma from pressure tensor anisotropy

    ### Statistical Analysis
    - `block_average(data, num_blocks=10)` - Block averaging with proper error estimation
    - `autocorrelation_function(data, max_lag)` - Compute ACF and correlation time

    ### Log Parsing
    - `parse_log_file(log_file, columns=None)` - Extract thermo data from log

    ### Visualization (saves PNG files)
    - `plot_temperature_profile(T_profile, output_file)` - Plot NEMD temperature profile
    - `plot_rdf(rdf_data, output_file)` - Plot radial distribution function
    - `plot_msd(msd_data, timestep, output_file, fit_result)` - Plot MSD with diffusion fit
    - `plot_stress_strain(data, output_file, modulus_result)` - Plot stress-strain curve
    - `plot_acf(acf_data, output_file)` - Plot autocorrelation function

