        logging.info(f"Found {len(pdb_files)} PDB files to process")
        
        # For ligand/surfactant systems, use topology files copied to work_dir, not input
        # Reference topologies by basename (they were already copied to working directory above)
        
        for pdb_file in pdb_files:
            protein_name = os.path.splitext(os.path.basename(pdb_file))[0]
            logging.info(f"Processing protein: {protein_name}")
            
            # pdb2gmx - Create topology and structure
            pdb2gmx_cmd = [
                "gmx", "pdb2gmx", "-f", pdb_file, 
                "-o", f"{protein_name}_processed.gro",
                "-p", f"{protein_name}.top",
                "-ff", "charmm36m",       # Force field selection (modern, recommended)
                "-water", "tip3p",         # Water model
                "-ignh"                    # Ignore hydrogen
            ]
            run_command(pdb2gmx_cmd, input_text="1\n1\n")  # Select force field and water
            
            # editconf - Create simulation box
            editconf_cmd = [
                "gmx", "editconf", "-f", f"{protein_name}_processed.gro",
                "-o", f"{protein_name}_box.gro",
                "-c", "-d", "1.0", "-bt", "cubic"
            ]
            run_command(editconf_cmd)
            
            # solvate - Add water molecules
            solvate_cmd = [
                "gmx", "solvate", "-cp", f"{protein_name}_box.gro",
                "-cs", "spc216.gro", "-o", f"{protein_name}_solv.gro",
                "-p", f"{protein_name}.top"
            ]
            run_command(solvate_cmd)
            
            logging.info(f"* Preparation complete for {protein_name}")
        
        # ============= STEP 2: SIMULATION =============
        logging.info("******* STEP 2: RUNNING SIMULATION *******")
        
        for pdb_file in pdb_files:
            protein_name = os.path.splitext(os.path.basename(pdb_file))[0]
            
            # genion - Add ions to neutralize system
            # Step 1: Prepare TPR for genion
            grompp_ions_cmd = [
                "gmx", "grompp", "-f", "ions.mdp",
                "-c", f"{protein_name}_solv.gro",
                "-p", f"{protein_name}.top",
                "-o", "ions.tpr", "-maxwarn", "1"
            ]
            run_command(grompp_ions_cmd)
            
            # Step 2: Actually add ions (replaces water molecules)
            genion_cmd = [
                "gmx", "genion", "-s", "ions.tpr",
                "-o", f"{protein_name}_ions.gro",
                "-p", f"{protein_name}.top",
                "-pname", "NA", "-nname", "CL", "-neutral"
            ]
            run_command(genion_cmd, input_text="13\n")  # Select SOL group for replacement
            
            # Energy minimization (use ionized structure)
            grompp_em_cmd = [
                "gmx", "grompp", "-f", "minim.mdp",
                "-c", f"{protein_name}_ions.gro",
                "-p", f"{protein_name}.top",
                "-o", f"{protein_name}_em.tpr", "-maxwarn", "1"
            ]
            run_command(grompp_em_cmd)
            
            run_mdrun_adaptive(f"{protein_name}_em", phase='em')
            
            # NVT equilibration
            grompp_nvt_cmd = [
                "gmx", "grompp", "-f", "nvt.mdp",
                "-c", f"{protein_name}_em.gro",
                "-p", f"{protein_name}.top",
                "-r", f"{protein_name}_em.gro",
                "-o", f"{protein_name}_nvt.tpr", "-maxwarn", "1"
            ]
            run_command(grompp_nvt_cmd)
            
            run_mdrun_adaptive(f"{protein_name}_nvt", phase='nvt')
            
            # NPT equilibration  
            grompp_npt_cmd = [
                "gmx", "grompp", "-f", "npt.mdp",
                "-c", f"{protein_name}_nvt.gro",
                "-p", f"{protein_name}.top",
                "-r", f"{protein_name}_nvt.gro",
                "-o", f"{protein_name}_npt.tpr", "-maxwarn", "1"
            ]
            run_command(grompp_npt_cmd)
            
            run_mdrun_adaptive(f"{protein_name}_npt", phase='npt', 
                             input_gro=f"{protein_name}_nvt.gro", 
                             topology=f"{protein_name}.top")
            
            # Production MD
            grompp_md_cmd = [
                "gmx", "grompp", "-f", "md.mdp",
                "-c", f"{protein_name}_npt.gro",
                "-p", f"{protein_name}.top",
                "-r", f"{protein_name}_npt.gro",
                "-o", f"{protein_name}_md.tpr", "-maxwarn", "1"
            ]
            run_command(grompp_md_cmd)
            
            run_mdrun_adaptive(f"{protein_name}_md", phase='md')
            
            logging.info(f"* Simulation complete for {protein_name}")
        
        # ============= STEP 3: ANALYSIS =============
        logging.info("******* STEP 3: ANALYSIS AND RESULTS *******")
        
        for pdb_file in pdb_files:
            protein_name = os.path.splitext(os.path.basename(pdb_file))[0]
            
            # RMSD Analysis
            rmsd_cmd = ["gmx", "rms", "-s", f"{protein_name}_md.tpr",
                       "-f", f"{protein_name}_md.xtc", "-o", f"{protein_name}_rmsd.xvg",
                       "-tu", "ns"]
            run_command(rmsd_cmd, input_text="4\n4\n")  # Backbone analysis
            
            # Radius of Gyration
            gyrate_cmd = ["gmx", "gyrate", "-s", f"{protein_name}_md.tpr",
                         "-f", f"{protein_name}_md.xtc", "-o", f"{protein_name}_gyrate.xvg"]
            run_command(gyrate_cmd, input_text="4\n")  # Backbone selection
            
            # Energy Analysis
            energy_cmd = ["gmx", "energy", "-f", f"{protein_name}_md.edr",
                         "-o", f"{protein_name}_energy.xvg"]
            run_command(energy_cmd, input_text="11\n12\n0\n")  # Potential energy
            
            # Copy analysis results to output
            for ext in ['_rmsd.xvg', '_gyrate.xvg', '_energy.xvg', '_md.xtc']:
                src = os.path.join(work_dir, f"{protein_name}{ext}")
                if os.path.exists(src):
                    subprocess.run(["cp", src, output_dir])
                    results["output_files"][f"{protein_name}{ext}"] = f"{output_dir}/{protein_name}{ext}"
            
            results["results"][protein_name] = {
                "trajectory": f"{protein_name}_md.xtc",
                "rmsd_analysis": f"{protein_name}_rmsd.xvg",
                "gyration_analysis": f"{protein_name}_gyrate.xvg",
                "energy_analysis": f"{protein_name}_energy.xvg"
            }
            results["summary"]["proteins_processed"] += 1
        
        results["summary"]["status"] = "completed"

    except Exception as e:
        logging.error(f"Error during workflow: {e}")
        results["summary"]["status"] = "failed"
        results["summary"]["error"] = str(e)

        # Copy intermediate files on exception for debugging
        logging.info("Copying intermediate files for debugging...")
        for pattern in ['*.gro', '*.tpr', '*.edr', '*.log', '*.mdp', '*.top']:
            for f in glob.glob(os.path.join(work_dir, pattern)):
                try:
                    shutil.copy(f, output_dir)
                except Exception:
                    pass

    finally:
        # ============= SAVE RESULTS =============
        with open(os.path.join(output_dir, 'final_results.json'), 'w') as f:
            json.dump(results, f, indent=2)
        logging.info(f"* Final results saved to {output_dir}/final_results.json")
    ```


