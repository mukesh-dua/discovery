    # REFERENCE: GROMACS COMMAND SPECIFICATIONS (FOR SCRIPT IMPLEMENTATION)
    
    Use the following as specifications when implementing commands in the script template above:
    
    **Command Requirements:**
    - Topology: `gmx pdb2gmx` with `-p {protein_name}.top` flag
    - Force fields: charmm36m (proteins, recommended), amber14sb (proteins, alternative), oplsaa (small organics), gromos54a7 (lipids)
    - Water models: tip3p, tip4p, spc/e recommended
    - All `grompp` commands: include `-maxwarn 1` and `-r` flags
    - Position restraints:
      - NVT: `-r {protein}_em.gro`
      - NPT: `-r {protein}_nvt.gro`
      - MD: `-r {protein}_npt.gro`
    - Interactive selections: use `input_text` parameter in `run_command()`
      - RMSD: `input_text="4\n4\n"` (backbone for both)
      - Gyration: `input_text="4\n"` (backbone)
      - SASA: `input_text="1\n"` (protein)
      - Genion: `input_text="13\n"` (water group)

    **Analysis Options (add to script as needed):**
    - RMSD: `gmx rms -s {tpr} -f {xtc} -o rmsd.xvg -tu ns`
    - Gyration: `gmx gyrate -s {tpr} -f {xtc} -o gyrate.xvg`
    - SASA: `gmx sasa -s {tpr} -f {xtc} -o sasa.xvg`
    - Hydrogen bonds: `gmx hbond -s {tpr} -f {xtc} -num hbnum.xvg`
    - Secondary structure: `gmx do_dssp -s {tpr} -f {xtc} -o ss.xpm`

