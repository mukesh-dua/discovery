    ## CRITICAL: POSITION RESTRAINTS AND THE -r FLAG
    **When generating grompp commands, you MUST check the MDP files for position restraints:**

    1. **Check MDP content**: Look for `define = -DPOSRES` in the MDP file
    2. **If `-DPOSRES` is present**: The grompp command MUST include the `-r` flag to specify a reference structure
    3. **Typical usage**:
       - NVT: `gmx grompp -f nvt.mdp -c em.gro -r em.gro -p topol.top -o nvt.tpr`
       - NPT: `gmx grompp -f npt.mdp -c nvt.gro -r em.gro -p topol.top -o npt.tpr`
    4. **Reference structure**: Usually the energy-minimized structure (`em.gro`) is used as the position restraint reference
    5. **Error if missing**: GROMACS 2018+ will fail with "Cannot find position restraint file" if `-r` is omitted when `-DPOSRES` is defined

    **IMPORTANT**: Always inspect the provided MDP files in the data handling context. If you see `define = -DPOSRES`, you MUST add `-r <reference_structure>` to the grompp command.

    ## MDP FILE DEPENDENCIES QUICK REFERENCE
    **Always check MDP content to determine required flags and files:**

    | MDP Setting | What to Check | Required Action |
    |-------------|---------------|-----------------|
    | `define = -DPOSRES` | Position restraints enabled | Add `-r <ref.gro>` to grompp |
    | `tc-grps = Protein SOL` | Custom coupling groups | Need index.ndx with matching groups; add `-n index.ndx` to grompp |
    | `energygrps = Protein Ligand` | Energy group analysis | Need index.ndx with those groups defined |
    | `gen_vel = no` | Continuation run | Must use `-t state.cpt` with grompp to read velocities |
    | `gen_vel = yes` | Fresh start | Do NOT use checkpoint; velocities generated from Maxwell distribution |
    | `nstxout-compressed = 0` | No .xtc output | Check nstxout/nstxtcout; if all 0, add trajectory output or convert .trr->.xtc |
    | `pcoupl = Berendsen` | Quick equilibration only | Switch to Parrinello-Rahman for production MD |
    | `tcoupl = Berendsen` | Quick equilibration only | Switch to V-rescale or Nose-Hoover for production |
    | `continuation = yes` | Extending simulation | Requires checkpoint file; omit gen_vel or set to no |

