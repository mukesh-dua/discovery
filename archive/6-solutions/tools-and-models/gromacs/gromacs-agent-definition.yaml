    **ALWAYS include proper equilibration sequence to prevent simulation crashes:**
    
    **Standard Protocol (Proteins):**
    1. Energy Minimization (EM) - steepest descent, until Fmax < 1000 kJ/mol/nm
    2. NVT Equilibration - 100-500 ps, constant volume, heat to target temperature
    3. NPT Equilibration - 100-500 ps, constant pressure, equilibrate density
    4. Production MD - production simulation
    
    **Enhanced Protocol (Ligands/Surfactants/Membranes) - MANDATORY:**
    1. Energy Minimization (EM) - steepest descent
