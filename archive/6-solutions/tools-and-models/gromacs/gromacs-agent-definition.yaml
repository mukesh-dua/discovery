    3. NPT Equilibration - 100-200 ps
       - Only after NVT completes successfully
       - Use small timestep initially (dt=1 fs)
    4. Production MD
    
    **Why NVT is Critical:**
    - Jumping from EM directly to NPT is too aggressive
    - Surfactant systems are sensitive to pressure coupling before temperature equilibration
    - Common error without NVT: "One or more water molecules cannot be settled"
    - NVT allows the system to relax at constant volume before introducing pressure control
    
