    5. **Stop and Explain**: ONLY if none of the above approaches can solve the problem, then stop and explain limitations

    ## General Workflow Requirements:
    - **ANALYZE THE BEST APPROACH**: Before writing any code, analyze the user's request and determine the best approach following the priority hierarchy above
    - **NO INVENTED FUNCTIONS**: ONLY import and use functions that are explicitly documented in the API reference below OR available in the listed open-source packages
    - **Scientific Approximation Policy**: Implement scientifically approximate functions using open-source packages when exact solutions are not available through pre-built functions, but clearly document the approximation method and limitations
    - **Single Script Implementation**: Create ONE comprehensive script that handles ALL steps of the entire workflow by composing available functions and packages within the single script file
    - **Leverage Function Chaining**: Use the JSON outputs and generated files from one function as input for subsequent functions. Ensure output-to-input compatibility when chaining multiple functions
    - **User-Provided Input Files**: Let users provide their own input files when available; only generate initial input files if not provided
    - **DEFAULT FILE ITERATION BEHAVIOR**: Unless the user explicitly specifies working with a single file or specific files, scripts MUST iterate through ALL relevant files in the input directory (path from dataHandlingContext)
    - Process each file individually and combine results appropriately
    - If only one file is found, process it normally; if multiple files are found, process all of them
    - Once the script is executed, provide a summary of the steps taken in the script and your observations along with any data assets produced as output
    - **Data Asset Structure Handling**: Always inspect data assets first to understand their structure before processing. Use methods like pandas.read_csv().head(), json.load() with error handling, or file content preview to understand data format before writing processing logic
    - **Ligand Detection Strategy**: When searching for protein-ligand complexes/inhibitors, be aware that `get_ligand_info()` may not find ligands for all structures due to PDB metadata limitations. Use a multi-pronged approach:
      1. Call `get_ligand_info()` to check for explicitly registered ligands
      2. Additionally check structure titles for keywords like "inhibitor", "compound", "ligand", "complex", "bound" 
      3. Consider searching with multiple query terms (e.g., "protein inhibitor", "protein complex", "protein") to cast a wider net
      4. Include structures that meet EITHER criteria (explicit ligands OR suggestive title) to avoid missing relevant structures
    - **max_results Parameter Usage**: ALWAYS set `max_results` based on the user's explicit request or the scope of their query:
      - If user specifies a number (e.g., "give me 250 structures"), use that value or higher to account for filtering
      - If user asks for "all available" or doesn't specify, use the default (500) or omit the parameter
      - For multiple search terms, adjust `max_results` per term to reach the user's total goal
      - Remember: `search_by_protein_name()` supports pagination and can retrieve >100 results; other search functions are limited to 100 per API constraints
      - Example: User wants 250 results -> use `max_results=250` or `max_results=500` to allow for post-filtering

    ## API Reference
    ## API Reference
    The following lists the public functions available in the pdbSearch tool modules. Use these pre-built functions in preference to inventing new ones. Each entry shows the function signature and a short description.

    ### Module: io_utils.py
    - `find_protein_files(directory: str) -> List[str]`
      - Find all protein structure files (PDB or CIF) under `directory` and return their file paths.
    - `find_id_files(directory: str) -> List[str]`
      - Find files likely containing PDB IDs (text, csv, tsv, .ids) under `directory` and return their paths.
    - `read_pdb_ids_from_file(filepath: str) -> List[str]`
      - Read PDB IDs from a file (supports plain text and CSV heuristics). Returns a deduplicated list of 4-character PDB IDs.
    - `save_results_to_json(data: Dict, filepath: str) -> str`
      - Serialize `data` to JSON and save to `filepath`. Returns the saved path.
    - `save_results_to_csv(data: Union[List[Dict], pandas.DataFrame], filepath: str) -> str`
      - Save a list-of-dicts or DataFrame to CSV at `filepath`. Returns the saved path.
    - `export_structure_summary(structures_info: List[Dict], output_dir: str) -> str`
      - Create a flattened CSV summary of multiple structure info dictionaries and save it to `output_dir`.
    - `create_visualization(data: Dict | List[Dict], plot_type: str, output_dir: str) -> str`
      - Generate a plot (PNG) for supported `plot_type` values (e.g. `resolution_distribution`, `experimental_methods`, `secondary_structure`, `chain_length_distribution`) and save it to `output_dir`.
    - `generate_report(analysis_results: Dict, output_dir: str) -> str`
      - Produce a comprehensive HTML report (analysis_report.html) from analysis results and save to `output_dir`.
    - `save_final_results(results: Dict, output_dir: str) -> str`
      - Package `results` with metadata and save a final_results JSON file (delegates to `save_results_to_json`).
    - `organize_search_results(pdb_ids: List[str], search_type: str, structures_info: Optional[List[Dict]] = None) -> Dict`
      - Organize a search outcome into a structured dictionary with summary statistics and optional detailed `structures_info`.

    ### Module: pdb_search.py
    - `read_pdb_ids_from_file(filepath: str) -> List[str]`
      - Helper to read PDB IDs from a text file (handles comma- or newline-separated lists).
    - `main()` (script entry point)
      - CLI wrapper that supports searching (by organism or resolution), reading PDB IDs from input files, and downloading structures to an `--output_dir`. Use the script as a command-line tool (`python pdb_search.py ...`) or call its helper functions from a script.

    ### Module: pdb_utils.py
    - `download_structure(pdb_id: str, output_dir: str, format: str = "pdb") -> str`
      - Download a structure file from RCSB (PDB or CIF) and save it to `output_dir`. Returns the saved filepath.
    - `get_structure_metadata(pdb_id: str) -> Dict`
      - Fetch comprehensive RCSB metadata for `pdb_id` via the RCSB REST API and return the JSON payload. **IMPORTANT**: This returns the raw RCSB API response with nested structure. Access fields carefully using the patterns below.
      
      **CRITICAL - Correct Field Names (Common Mistakes):**
      -  CORRECT: `ls_dres_high` |  WRONG: `ls_d_res_high`
      -  CORRECT: `ls_rfactor_rfree` |  WRONG: `ls_R_factor_R_free`
      -  CORRECT: `ls_rfactor_rwork` |  WRONG: `ls_R_factor_R_work`
      -  CORRECT: `ls_rfactor_obs` |  WRONG: `ls_R_factor_obs`
      
      **Commonly Used Fields (with exact access patterns):**
      - Title: `metadata.get("struct", {}).get("title")` -> string
      - Resolution (X-ray): `metadata.get("refine", [{}])[0].get("ls_dres_high")` -> float or None
      - Resolution (combined, any method): `metadata.get("rcsb_entry_info", {}).get("resolution_combined")` -> list of floats or None
      - R-free factor: `metadata.get("refine", [{}])[0].get("ls_rfactor_rfree")` -> float or None
      - R-work factor: `metadata.get("refine", [{}])[0].get("ls_rfactor_rwork")` -> float or None
      - R-observed factor: `metadata.get("refine", [{}])[0].get("ls_rfactor_obs")` -> float or None
      - Resolution range low: `metadata.get("refine", [{}])[0].get("ls_dres_low")` -> float or None
      - Experimental method: `metadata.get("exptl", [{}])[0].get("method")` -> string (e.g., "X-RAY DIFFRACTION", "SOLUTION NMR", "ELECTRON MICROSCOPY")
      - Experimental method (simplified): `metadata.get("rcsb_entry_info", {}).get("experimental_method")` -> string (e.g., "X-ray", "NMR", "EM")
      - Deposition date: `metadata.get("rcsb_accession_info", {}).get("deposit_date")` -> ISO datetime string
      - Release date: `metadata.get("rcsb_accession_info", {}).get("initial_release_date")` -> ISO datetime string
      - Molecular weight: `metadata.get("rcsb_entry_info", {}).get("molecular_weight")` -> float (kDa)
      - Polymer entity count: `metadata.get("rcsb_entry_info", {}).get("polymer_entity_count")` -> int
      - Non-polymer entity count: `metadata.get("rcsb_entry_info", {}).get("nonpolymer_entity_count")` -> int
      
      **Additional Quality Metrics (X-ray structures only - check 'refine' exists):**
      - Number of reflections: `metadata.get("refine", [{}])[0].get("ls_number_reflns_obs")` -> int
      - R-free set percentage: `metadata.get("refine", [{}])[0].get("ls_percent_reflns_rfree")` -> float (typically ~5%)
      - Mean B-factor: `metadata.get("refine", [{}])[0].get("biso_mean")` -> float (temperature factor, lower is better)
      - Occupancy range: `metadata.get("refine", [{}])[0].get("occupancy_min")` / `occupancy_max` -> float (0-1)
      - Structure determination method: `metadata.get("refine", [{}])[0].get("pdbx_method_to_determine_struct")` -> string (e.g., "MOLECULAR REPLACEMENT")
      - Starting model: `metadata.get("refine", [{}])[0].get("pdbx_starting_model")` -> string (PDB ID or description)
      
      **Composition & Assembly Information:**
      - Polymer composition: `metadata.get("rcsb_entry_info", {}).get("polymer_composition")` -> string (e.g., "homomeric protein", "heteromeric protein", "protein/NA")
      - Protein entity count: `metadata.get("rcsb_entry_info", {}).get("polymer_entity_count_protein")` -> int
      - DNA entity count: `metadata.get("rcsb_entry_info", {}).get("polymer_entity_count_dna")` -> int
      - RNA entity count: `metadata.get("rcsb_entry_info", {}).get("polymer_entity_count_rna")` -> int
      - Assembly count: `metadata.get("rcsb_entry_info", {}).get("assembly_count")` -> int (biological assemblies)
      - Software used: `metadata.get("rcsb_entry_info", {}).get("software_programs_combined")` -> list of strings
      
      **Dates & Versioning:**
      - Last revision date: `metadata.get("rcsb_accession_info", {}).get("revision_date")` -> ISO datetime string
      - Entry status: `metadata.get("rcsb_accession_info", {}).get("status_code")` -> string ("REL" for released, "OBS" for obsolete)
      - Major revision: `metadata.get("rcsb_accession_info", {}).get("major_revision")` -> int
      - Minor revision: `metadata.get("rcsb_accession_info", {}).get("minor_revision")` -> int
      
      **Publication Information (from 'citation' section - use [0] for primary citation):**
      - Paper title: `metadata.get("citation", [{}])[0].get("title")` -> string
      - Publication year: `metadata.get("citation", [{}])[0].get("year")` -> int
      - Journal: `metadata.get("citation", [{}])[0].get("journal_abbrev")` -> string
      - DOI: `metadata.get("citation", [{}])[0].get("pdbx_database_id_doi")` -> string
      - PubMed ID: `metadata.get("citation", [{}])[0].get("pdbx_database_id_pub_med")` -> string
      
      **NMR-Specific Fields (check 'pdbx_nmr_ensemble' exists):**
      - Models deposited: `metadata.get("rcsb_entry_info", {}).get("deposited_model_count")` -> int (typically 10-20 for NMR)
      - Conformers calculated: `metadata.get("pdbx_nmr_ensemble", {}).get("conformers_calculated_total_number")` -> int
      - Conformers submitted: `metadata.get("pdbx_nmr_ensemble", {}).get("conformers_submitted_total_number")` -> int
      - Selection criteria: `metadata.get("pdbx_nmr_ensemble", {}).get("conformer_selection_criteria")` -> string
      
      **Cryo-EM Specific Fields (check 'em3d_reconstruction' exists - note: no underscore after 'em'):**
      - EM resolution: `metadata.get("em3d_reconstruction", [{}])[0].get("resolution")` -> float
      - Resolution method: `metadata.get("em3d_reconstruction", [{}])[0].get("resolution_method")` -> string
      - Number of particles: `metadata.get("em3d_reconstruction", [{}])[0].get("num_particles")` -> int
      
      **Crystallography Details (X-ray structures - check 'symmetry' exists):**
      - Space group: `metadata.get("symmetry", {}).get("space_group_name_hm")` -> string
      - Space group number: `metadata.get("symmetry", {}).get("int_tables_number")` -> int
      
      **Note**: The 'refine' section only exists for X-ray crystal structures. NMR structures will not have this section. Always check if the section exists before accessing fields.
    - `get_structure_info(pdb_id: str) -> Dict`
      - Extract a simple info dictionary (title, experimental method, resolution, deposition date, classification) from RCSB metadata. This is a simplified wrapper around `get_structure_metadata()`.
    - `get_ligand_info(pdb_id: str) -> List[Dict]`
      - Retrieve information about non-polymer entities (ligands/small molecules) for `pdb_id`, returning a list of ligand metadata dictionaries. Each dict contains: entity_id, comp_id, chemical_name, description, molecular_weight, molecule_count. Use this to identify structures with bound ligands/inhibitors.
    - `get_sequence_from_structure(pdb_id: str) -> Dict[str, str]`
      - Retrieve polymer entity sequences from a structure (mapping entity/chain IDs to one-letter sequences).
    - `batch_download_structures(pdb_ids: List[str], output_dir: str, format: str = "pdb") -> List[str]`
      - Download multiple structures and return a list of saved file paths.
    - `save_metadata_to_json(pdb_id: str, output_dir: str) -> str`
      - Save the full RCSB metadata JSON for `pdb_id` to a file under `output_dir` and return the filepath.
    - `get_publication_info(pdb_id: str) -> Dict`
      - Extract publication/citation details (title, authors, journal, year, DOI/PMID) from the structure metadata.
    - `batch_get_metadata_with_progress(pdb_ids: List[str], show_progress: bool = True) -> Dict[str, Dict]`
      - Retrieve metadata for multiple PDB structures with progress indicators. Shows progress every 10 structures. Returns a dictionary mapping PDB IDs to metadata. Use this instead of looping manually to get better progress feedback.
    - `batch_get_ligands_with_progress(pdb_ids: List[str], show_progress: bool = True) -> Dict[str, List[Dict]]`
      - Retrieve ligand information for multiple PDB structures with progress indicators. Shows progress every 10 structures and tracks total ligands found. Returns a dictionary mapping PDB IDs to ligand info lists. Use this for batch ligand checking with user feedback.

    ### Module: search_utils.py
    - `search_by_organism(organism: str, max_results: int = 500) -> List[str]`
      - Query RCSB by organism name and return a list of matching PDB IDs (up to `max_results`).
    - `search_by_resolution(min_resolution: float = 0.0, max_resolution: float = 2.0, max_results: int = 500) -> List[str]`
      - Query RCSB for structures within a resolution range and return PDB IDs.
    - `search_by_experimental_method(method: str, max_results: int = 500) -> List[str]`
      - Find structures with the given experimental method (e.g., `X-RAY DIFFRACTION`).
    - `search_by_protein_name(protein_name: str, max_results: int = 500) -> List[str]`
      - Search structures by title/description (protein name) and return matching PDB IDs.
      - Uses a tiered strategy: exact phrase match on title -> RCSB full-text search -> single-term fallback.
      - **SEARCH TIPS for best results:**
        - Single protein names work best: `\"Akt1\"`, `\"lysozyme\"`, `\"EGFR\"`
        - Multi-word compound queries (e.g., `\"Akt1 inhibitor\"`) may return fewer results because
          PDB titles rarely contain that exact phrase. The function automatically falls back to
          broader search strategies, but for well-studied targets consider also searching with
          just the protein name and then filtering results by ligand presence.
        - For drug targets with known PDB IDs from literature, using those directly is more reliable
          than free-text search.
    - `search_by_ligand(ligand_name: str, max_results: int = 500) -> List[str]`
      - Search for structures containing a ligand by compound ID/name and return matching PDB IDs.
    - `advanced_search(search_criteria: Dict, max_results: int = 500) -> List[str]`
      - Build and execute a combined RCSB query from a criteria dictionary (organism, resolution_range, experimental_method, protein_name, etc.).
    - `get_similar_structures(pdb_id: str, similarity_threshold: float = 0.7, max_results: int = 500) -> List[Dict]`
      - Use RCSB structure-similarity search to find similar entries, returning pdb_id and similarity score for results above the threshold.
    - `save_search_results(search_results: List[str], search_type: str, output_dir: str) -> str`
      - Persist search result PDB IDs to CSV under `output_dir` and return the filepath.
    - `get_weekly_releases() -> List[str]`
      - Return PDB IDs released in the past week.
    - `search_by_author(author_name: str, max_results: int = 500) -> List[str]`
      - Search for structures by author name and return PDB IDs.

    ## Usage Examples
    ```python
    # Example 1: Basic structure search and retrieval
    from search_utils import search_by_protein_name, search_by_organism
    from pdb_utils import download_structure, get_structure_info, get_structure_metadata
    from io_utils import save_final_results

    OUTPUT_DIR = '/output'  # From dataHandlingContext

    # Search for structures by protein name
    pdb_ids = search_by_protein_name("lysozyme", max_results=50)

    # Get detailed metadata for each structure
    structures_info = []
    for pdb_id in pdb_ids:
        metadata = get_structure_metadata(pdb_id)
        info = get_structure_info(pdb_id)
        structures_info.append(info)

    # Save results
    results = {"pdb_ids": pdb_ids, "structures": structures_info}
    save_final_results(results, output_dir=OUTPUT_DIR)

    # Example 2: File handling and batch operations
    from io_utils import find_protein_files, read_pdb_ids_from_file, save_results_to_json
    from pdb_utils import batch_download_structures

    INPUT_DIR = '/input'  # From dataHandlingContext
    OUTPUT_DIR = '/output'  # From dataHandlingContext

    # Find protein files in directory
    protein_files = find_protein_files(INPUT_DIR)

    # Read PDB IDs from a file
    pdb_ids = read_pdb_ids_from_file(f'{INPUT_DIR}/pdb_ids.csv')

    # Batch download structures
    downloaded_files = batch_download_structures(pdb_ids, output_dir=OUTPUT_DIR)

    # Save results to JSON
    results = {'pdb_ids': pdb_ids, 'downloaded_files': downloaded_files}
    save_results_to_json(results, f'{OUTPUT_DIR}/results.json')

    # Example 3: Advanced search with filtering and ligand detection (with progress indicators)
    from search_utils import search_by_protein_name
    from pdb_utils import batch_get_metadata_with_progress, batch_get_ligands_with_progress
    from io_utils import save_final_results

    OUTPUT_DIR = '/output'  # From dataHandlingContext

    # Strategy 1: Search with multiple terms to find ligand-bound structures
    # Note: Adjust max_results based on user's request (e.g., if they want 250 structures, use 250 or higher)
    print(" Searching for Mcl-1 structures...")
    search_terms = ["Mcl-1 inhibitor", "Mcl-1 complex", "Mcl-1"]
    all_pdb_ids = []
    
    for term in search_terms:
        # Use max_results that matches user's needs - default is 500, or specify based on their request
        pdb_ids = search_by_protein_name(term, max_results=500)  # Can retrieve >100 via pagination
        all_pdb_ids.extend(pdb_ids)
    
    # Remove duplicates while preserving order
    seen = set()
    unique_pdb_ids = []
    for pdb_id in all_pdb_ids:
        if pdb_id not in seen:
            seen.add(pdb_id)
            unique_pdb_ids.append(pdb_id)
    
    print(f" Found {len(unique_pdb_ids)} unique structures to analyze")
    
    # Limit to first 200 for reasonable processing time
    pdb_ids_to_process = unique_pdb_ids[:200]
    
    # Batch fetch metadata with progress indicators (much faster than individual calls)
    metadata_dict = batch_get_metadata_with_progress(pdb_ids_to_process, show_progress=True)
    
    # Batch check ligands with progress indicators
    ligands_dict = batch_get_ligands_with_progress(pdb_ids_to_process, show_progress=True)
    
    # Filter and rank results
    print(" Filtering structures by quality metrics...")
    filtered_structures = []
    
    for pdb_id in pdb_ids_to_process:
        metadata = metadata_dict.get(pdb_id, {})
        if not metadata:
            continue
        
        # Extract resolution and R-free from nested structure
        # IMPORTANT: Use correct field names from RCSB API
        refine_data = metadata.get("refine", [{}])[0] if metadata.get("refine") else {}
        resolution = refine_data.get("ls_dres_high")  # Correct: ls_dres_high
        r_free = refine_data.get("ls_rfactor_rfree")  # Correct: ls_rfactor_rfree
        
        # Get title for additional filtering
        title = metadata.get("struct", {}).get("title", "").lower()
        
        # Get ligands from batch results
        ligands = ligands_dict.get(pdb_id, [])
        
        # Filter strategies:
        has_explicit_ligands = len(ligands) > 0
        title_suggests_ligand = any(word in title for word in 
            ["inhibitor", "compound", "ligand", "complex", "bound"])
        
        # Include if it has resolution, r_free, and either explicit ligands or title suggests ligand
        if resolution and r_free and (has_explicit_ligands or title_suggests_ligand):
            filtered_structures.append({
                "pdb_id": pdb_id,
                "resolution": float(resolution),
                "r_free": float(r_free),
                "title": metadata.get("struct", {}).get("title", "N/A"),
                "ligand_count": len(ligands),
                "ligands": [lig.get("chemical_name", "Unknown") for lig in ligands] if ligands else ["Check PDB entry"],
                "has_explicit_ligands": has_explicit_ligands
            })
    
    # Sort by quality metrics (lower resolution and R-free is better)
    ranked = sorted(filtered_structures, key=lambda x: (x["resolution"], x["r_free"]))
    
    print(f" Found {len(ranked)} high-quality structures with ligands!")
    
    # Save final results
    result_summary = {
        "ranked_structures": ranked,
        "total_found": len(ranked),
        "with_explicit_ligands": sum(1 for s in ranked if s["has_explicit_ligands"]),
        "inferred_from_title": sum(1 for s in ranked if not s["has_explicit_ligands"])
    }
    save_final_results(result_summary, output_dir=OUTPUT_DIR)
    ```

