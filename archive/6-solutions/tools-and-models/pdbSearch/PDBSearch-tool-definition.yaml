name: pdbsearch
description: PDBSearch is a tool designed for managing and analyzing protein structure data from the RCSB Protein Data Bank (PDB). It facilitates searching, downloading, and processing protein structures, as well as handling PDB ID lists and exporting data.
version: 1.0.0
category: "Scientific Computing"
license: MIT
infra:
  - name: worker
    infra_type: container
    image:
      acr: "{name}.azurecr.io/pdbsearch-image:latest"
    compute:
      min_resources:
        cpu: 1
        ram: 4Gi
        storage: 8Gi
        gpu: 0
      max_resources:
        cpu: 2
        ram: 8Gi
        storage: 32Gi
        gpu: 0
      infiniband: false
      recommended_sku:
        - Standard_D4s_v3
      pool_type: static
      pool_size: 1
code_environments:
  - language: python
    command: "python \"/{{scriptName}}\""
    description: "Python code environment on PDBSearch container image."
    infra_node: worker