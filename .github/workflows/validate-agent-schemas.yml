name: Validate Agent Schemas

# This workflow is a *required* status check on `main`. GitHub treats a
# non-triggered required check as "expected, never reported" which blocks PRs
# that don't touch the trigger paths. To avoid that, the workflow runs on
# every PR and uses an internal "Detect relevant changes" guard step — the
# real work is skipped (but the check still reports success) when none of
# the agent/tool/metadata schema files changed.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-schemas:
    name: Agent / tool / metadata schema regression guard (AS-001 – AS-005)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # NOTE: All PRs in this repo come from forks (including those by maintainers).
      # CODEOWNERS + branch protection are the merge gate; the schema-regression
      # checks below just verify that any proposed schema change doesn't break
      # the existing catalog. The workflow is data-only — it reads JSON files
      # as data and never executes PR-supplied code.

      - name: Detect relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILES=$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          if echo "$FILES" | grep -E '^docs/schemas/(agent-schema-v2|tool-definition-schema|metadata-schema)\.json$' >/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No agent/tool/metadata schema files changed; reporting success without running regression guard."
          fi

      - name: Checkout PR branch
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: pip install jsonschema pyyaml

      - name: AS-001 — Schema files are valid JSON
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys
          for f in [
              'docs/schemas/agent-schema-v2.json',
              'docs/schemas/tool-definition-schema.json',
              'docs/schemas/metadata-schema.json',
          ]:
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'  OK: {f}')
              except Exception as e:
                  print(f'  FAIL: {f}: {e}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: AS-002 — Schemas are valid JSON Schema Draft 7
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, jsonschema
          for f in [
              'docs/schemas/agent-schema-v2.json',
              'docs/schemas/tool-definition-schema.json',
              'docs/schemas/metadata-schema.json',
          ]:
              with open(f) as fh:
                  schema = json.load(fh)
              try:
                  jsonschema.Draft7Validator.check_schema(schema)
                  print(f'  OK: {f}')
              except jsonschema.exceptions.SchemaError as e:
                  print(f'  FAIL: {f}: {e.message}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: AS-003 — Every existing agents/*/metadata.yaml validates against updated metadata-schema.json
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, glob, jsonschema, yaml
          with open('docs/schemas/metadata-schema.json') as f:
              schema = json.load(f)
          validator = jsonschema.Draft7Validator(schema)
          failed = False
          for meta_path in sorted(glob.glob('agents/*/metadata.yaml')):
              with open(meta_path) as f:
                  data = yaml.safe_load(f)
              errors = list(validator.iter_errors(data))
              if errors:
                  for e in errors:
                      path_str = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                      print(f'  FAIL: {meta_path} at {path_str}: {e.message}', file=sys.stderr)
                  failed = True
              else:
                  print(f'  OK: {meta_path}')
          if failed:
              sys.exit(1)
          "

      - name: AS-004 — Every existing agents/*/agent.yaml validates against updated agent-schema-v2.json
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, glob, jsonschema, yaml
          with open('docs/schemas/agent-schema-v2.json') as f:
              schema = json.load(f)
          validator = jsonschema.Draft7Validator(schema)
          failed = False
          for agent_path in sorted(glob.glob('agents/*/agent.yaml')):
              with open(agent_path) as f:
                  data = yaml.safe_load(f)
              errors = list(validator.iter_errors(data))
              if errors:
                  for e in errors:
                      path_str = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                      print(f'  FAIL: {agent_path} at {path_str}: {e.message}', file=sys.stderr)
                  failed = True
              else:
                  print(f'  OK: {agent_path}')
          if failed:
              sys.exit(1)
          "

      - name: AS-005 — Every existing agents/*/tools/*/tool.yaml validates against updated tool-definition-schema.json
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, glob, jsonschema, yaml
          with open('docs/schemas/tool-definition-schema.json') as f:
              schema = json.load(f)
          validator = jsonschema.Draft7Validator(schema)
          failed = False
          for tool_path in sorted(glob.glob('agents/*/tools/*/tool.yaml')):
              with open(tool_path) as f:
                  data = yaml.safe_load(f)
              errors = list(validator.iter_errors(data))
              if errors:
                  for e in errors:
                      path_str = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                      print(f'  FAIL: {tool_path} at {path_str}: {e.message}', file=sys.stderr)
                  failed = True
              else:
                  print(f'  OK: {tool_path}')
          if failed:
              sys.exit(1)
          "
