name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "starter-kits/**"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual registry refresh"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-registry
  cancel-in-progress: false

jobs:
  update-registry:
    name: Rebuild .auto-registry/agent-registry.json
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history needed so the commit author is resolved correctly
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Rebuild .auto-registry/agent-registry.json
        run: python .github/scripts/update_registry.py --repo-root . --output .auto-registry/agent-registry.json

      - name: Validate generated registry against registry-schema.json
        run: |
          python -c "
          import json, sys, jsonschema
          with open('docs/schemas/registry-schema.json') as f:
              schema = json.load(f)
          with open('.auto-registry/agent-registry.json') as f:
              data = json.load(f)
          v = jsonschema.Draft7Validator(schema)
          errors = sorted(v.iter_errors(data), key=lambda e: list(e.path))
          if errors:
              for e in errors:
                  path = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                  print(f'  FAIL: registry at {path}: {e.message}', file=sys.stderr)
              sys.exit(1)
          print('  OK: generated registry conforms to registry-schema.json')
          "

      - name: Check for changes
        id: diff
        run: |
          # `git diff` ignores untracked files, so we must `git add` first
          # otherwise a brand-new .auto-registry/agent-registry.json (i.e. the
          # very first time this workflow runs, or after the file is deleted)
          # would be classified as "no change" and never committed.
          git add .auto-registry/agent-registry.json
          if git diff --cached --quiet -- .auto-registry/agent-registry.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated registry to a PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Branch name is deterministic so concurrent runs converge on the same
          # PR instead of creating dozens of stale branches.
          BRANCH="chore/registry-refresh"

          # If a previous run left the branch behind, reset it to main so we
          # don't accumulate unrelated commits.
          git fetch origin "$BRANCH" --depth=1 2>/dev/null || true
          git checkout -B "$BRANCH"

          # Already staged in the previous step.
          ADDED=$(git diff --cached .auto-registry/agent-registry.json | grep '^\+.*"path"' | wc -l | tr -d ' ')
          REMOVED=$(git diff --cached .auto-registry/agent-registry.json | grep '^\-.*"path"' | wc -l | tr -d ' ')
          COMMIT_MSG="chore: update .auto-registry/agent-registry.json (+${ADDED}/-${REMOVED} entries) [skip ci]"
          git commit -m "$COMMIT_MSG"

          # Force-push so the branch is always exactly "main + this commit".
          git push --force origin "$BRANCH"

          # Create the PR if one doesn't already exist for this branch.
          if ! gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Automated registry refresh triggered by changes under \`agents/**\` or \`starter-kits/**\`. Generated by the *Update Registry* workflow."
          else
            echo "PR already exists for $BRANCH — force-push updated it in place."
          fi

          # Try to enable auto-merge so this lands as soon as required checks pass.
          PR_NUMBER=$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq .number)
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch || \
            echo "::warning::Could not enable auto-merge on PR #$PR_NUMBER — a maintainer will need to merge it manually."