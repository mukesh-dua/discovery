name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "starter-kits/**"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual registry refresh"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-registry
  cancel-in-progress: false

jobs:
  update-registry:
    name: Rebuild .auto-registry/*-registry.json
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history needed so the commit author is resolved correctly
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Rebuild .auto-registry/agent-registry.json
        run: python .github/scripts/update_registry.py --repo-root . --output .auto-registry/agent-registry.json

      - name: Validate agent-registry.json against registry-schema.json
        run: |
          python -c "
          import json, sys, jsonschema
          with open('docs/schemas/registry-schema.json') as f:
              schema = json.load(f)
          with open('.auto-registry/agent-registry.json') as f:
              data = json.load(f)
          v = jsonschema.Draft7Validator(schema)
          errors = sorted(v.iter_errors(data), key=lambda e: list(e.path))
          if errors:
              for e in errors:
                  path = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                  print(f'  FAIL: registry at {path}: {e.message}', file=sys.stderr)
              sys.exit(1)
          print('  OK: agent-registry.json conforms to registry-schema.json')
          "

      # Starter-kit registry depends on the freshly-generated agent-registry
      # (the script reads agent paths from it), so this MUST run after the
      # agent-registry step. If there are no starter-kits in the repo the
      # script produces no output and we just skip validation for that file.
      - name: Rebuild .auto-registry/starter-kit-registry.json
        run: python .github/scripts/update_starter_kits_registry.py --repo-root .

      - name: Validate starter-kit-registry.json against starter-kit-registry-schema.json
        run: |
          python -c "
          import json, sys, os
          try:
              import jsonschema
              if not os.path.exists('.auto-registry/starter-kit-registry.json'):
                  print('  SKIP: no starter-kit-registry.json produced (no kits in repo).')
                  sys.exit(0)
              with open('docs/schemas/starter-kit-registry-schema.json') as f:
                  schema = json.load(f)
              with open('.auto-registry/starter-kit-registry.json') as f:
                  registry = json.load(f)
              jsonschema.Draft7Validator.check_schema(schema)
              validator = jsonschema.Draft7Validator(schema)
              errors = sorted(validator.iter_errors(registry), key=lambda e: list(e.absolute_path))
              if errors:
                  for err in errors:
                      path_str = ' -> '.join(str(p) for p in err.absolute_path) or '(root)'
                      print(f'  FAIL at {path_str}: {err.message}', file=sys.stderr)
                  sys.exit(1)
              print(f'  OK: starter-kit-registry.json conforms ({len(registry.get(\"kits\", []))} kit(s)).')
          except json.JSONDecodeError as e:
              print(f'  FAIL: starter-kit-registry.json is not valid JSON: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Check for changes
        id: diff
        run: |
          # `git diff` ignores untracked files, so we must `git add` first
          # otherwise a brand-new .auto-registry/*.json (i.e. the very first
          # time this workflow runs, or after the files are deleted) would
          # be classified as "no change" and never committed.
          git add .auto-registry/agent-registry.json
          if [ -f .auto-registry/starter-kit-registry.json ]; then
            git add .auto-registry/starter-kit-registry.json
          fi
          if git diff --cached --quiet -- .auto-registry/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Mint a short-lived (~1h) GitHub App installation token. Required
      # because the org disables "Allow GitHub Actions to create and approve
      # pull requests", so the default GITHUB_TOKEN cannot call gh pr create /
      # gh pr merge --auto on this repo. The App (discovery-registry-bot) has
      # Contents: Read + Pull requests: Write on microsoft/discovery.
      # If REGISTRY_APP_ID is unset (App not yet wired up), this step is
      # skipped and the workflow falls back to the warn-and-exit path below.
      - name: Generate App installation token
        if: steps.diff.outputs.changed == 'true' && secrets.REGISTRY_APP_ID != ''
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REGISTRY_APP_ID }}
          private-key: ${{ secrets.REGISTRY_APP_PRIVATE_KEY }}

      - name: Commit updated registry to a PR
        if: steps.diff.outputs.changed == 'true'
        env:
          # Use the App installation token for gh pr create / gh pr merge --auto
          # when available; fall back to GITHUB_TOKEN otherwise so the script
          # can still log a useful diagnostic instead of hard-failing.
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
          HAS_APP_TOKEN: ${{ steps.app_token.outputs.token != '' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Branch name is deterministic so concurrent runs converge on the same
          # PR instead of creating dozens of stale branches.
          BRANCH="chore/registry-refresh"

          # If a previous run left the branch behind, reset it to main so we
          # don't accumulate unrelated commits.
          git fetch origin "$BRANCH" --depth=1 2>/dev/null || true
          git checkout -B "$BRANCH"

          # Compose a commit message that reflects what actually changed.
          # Both files are already staged in the previous step. `|| true`
          # inside a subshell so grep exit 1 (no matches) doesn't abort
          # the script under `set -euo pipefail`.
          AGENT_DIFF=$(git diff --cached -- .auto-registry/agent-registry.json || true)
          KIT_DIFF=$(git diff --cached -- .auto-registry/starter-kit-registry.json || true)
          AGENT_ADDED=$(echo "$AGENT_DIFF" | { grep '^\+.*"path"' || true; } | wc -l | tr -d ' ')
          AGENT_REMOVED=$(echo "$AGENT_DIFF" | { grep '^\-.*"path"' || true; } | wc -l | tr -d ' ')
          PARTS=()
          if [ -n "$AGENT_DIFF" ]; then
            PARTS+=("agent-registry +${AGENT_ADDED}/-${AGENT_REMOVED}")
          fi
          if [ -n "$KIT_DIFF" ]; then
            PARTS+=("starter-kit-registry updated")
          fi
          # Join PARTS with ", "
          SUMMARY=$(IFS=', '; echo "${PARTS[*]}")
          COMMIT_MSG="chore: update .auto-registry/ ($SUMMARY) [skip ci]"
          git commit -m "$COMMIT_MSG"

          # Force-push so the branch is always exactly "main + this commit".
          # GITHUB_TOKEN has Contents: write here, so the push works regardless
          # of which token GH_TOKEN points at.
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            "$BRANCH"

          if [ "$HAS_APP_TOKEN" != "true" ]; then
            echo "::warning::REGISTRY_APP_ID/REGISTRY_APP_PRIVATE_KEY secrets are not configured. Branch ${BRANCH} was force-pushed with the regenerated registry files, but no PR can be opened from GITHUB_TOKEN under this repo's policy. A maintainer must open the PR manually, or wire up the discovery-registry-bot GitHub App."
            exit 0
          fi

          # Create the PR if one doesn't already exist for this branch.
          if ! gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Automated registry refresh triggered by changes under \`agents/**\` or \`starter-kits/**\`. Generated by the *Update Registry* workflow.\n\nContains both \`.auto-registry/agent-registry.json\` and \`.auto-registry/starter-kit-registry.json\` updates (whichever changed)."
          else
            echo "PR already exists for $BRANCH — force-push updated it in place."
          fi

          # Try to enable auto-merge so this lands as soon as required checks pass.
          PR_NUMBER=$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq .number)
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch || \
            echo "::warning::Could not enable auto-merge on PR #$PR_NUMBER — a maintainer will need to merge it manually."