name: Validate Starter Kit Schema

# This workflow is a *required* status check on `main`. GitHub treats a
# non-triggered required check as "expected, never reported" which blocks PRs
# that don't touch the trigger paths. The workflow now runs on every PR and a
# "Detect relevant changes" guard step skips the real work (still reporting
# success) when the starter-kit schemas weren't touched.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-schema:
    name: Schema regression guard (SKS-001 – SKS-003)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # NOTE: All PRs in this repo come from forks (including those by maintainers).
      # CODEOWNERS + branch protection are the merge gate; the schema-regression
      # checks below just verify that any proposed schema change doesn't break
      # the existing catalog. The workflow is data-only — it reads JSON files
      # as data and never executes PR-supplied code.

      - name: Detect relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILES=$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          if echo "$FILES" | grep -E '^docs/schemas/(starter-kit-schema|starter-kit-registry-schema)\.json$' >/dev/null; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No starter-kit schema files changed; reporting success without running regression guard."
          fi

      - name: Checkout PR branch
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/checkout@v7

      - name: Set up Python
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: pip install jsonschema pyyaml

      - name: SKS-001 — Schema files are valid JSON
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys
          for f in [
              'docs/schemas/starter-kit-schema.json',
              'docs/schemas/starter-kit-registry-schema.json',
          ]:
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'  OK: {f}')
              except Exception as e:
                  print(f'  FAIL: {f}: {e}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: SKS-002 — Schemas are valid JSON Schema Draft 7
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, jsonschema
          for f in [
              'docs/schemas/starter-kit-schema.json',
              'docs/schemas/starter-kit-registry-schema.json',
          ]:
              with open(f) as fh:
                  schema = json.load(fh)
              try:
                  jsonschema.Draft7Validator.check_schema(schema)
                  print(f'  OK: {f}')
              except jsonschema.exceptions.SchemaError as e:
                  print(f'  FAIL: {f}: {e.message}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: SKS-003 — All existing kits validate against updated starter-kit-schema.json
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python -c "
          import json, sys, glob, jsonschema
          with open('docs/schemas/starter-kit-schema.json') as f:
              schema = json.load(f)
          validator = jsonschema.Draft7Validator(schema)
          failed = False
          paths = sorted(glob.glob('starter-kits/*/kit.json'))
          for plugin_path in paths:
              with open(plugin_path) as f:
                  manifest = json.load(f)
              errors = list(validator.iter_errors(manifest))
              if errors:
                  for e in errors:
                      path_str = ' -> '.join(str(p) for p in e.absolute_path) or '(root)'
                      print(f'  FAIL: {plugin_path} at {path_str}: {e.message}', file=sys.stderr)
                  failed = True
              else:
                  print(f'  OK: {plugin_path}')
          if failed:
              sys.exit(1)
          "